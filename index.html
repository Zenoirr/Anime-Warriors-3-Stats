es with a devastating energy blade that pierces through all enemies.","cooldown":40,"dmgMulti":20}},{"name":"Ultimate Gohun Style","displayName":"Ultimate Gohun Style","rarity":"mythical","description":"Build energy with each strike to unleash your ultimate transformation. +Damage +Attack Speed.","stats":{"damage":7},"hasUlt":true,"hasTransform":true,"tags":["style"],"ult":{"displayName":"Special Beast Cannon","description":"Channel your inner beast to fire a devastating energy beam that pierces through all enemies.","cooldown":40,"dmgMulti":20},"transform":{"charge":4,"required":100,"duration":20,"buffs":{"damage":30,"attackSpeed":25}}},{"name":"Sosoke Style","displayName":"Sosoke Style","rarity":"mythical","description":"A lethal sword style combined with the power of lightning.","stats":{"damage":9},"hasUlt":true,"hasTransform":false,"tags":["style","sword"],"ult":{"displayName":"Kirin","description":"Channel lightning from the heavens to strike down your enemies with a devastating thunderbolt.","cooldown":40,"dmgMulti":20}},{"name":"Thunder God Staff","displayName":"Thunder God Staff","rarity":"mythical","description":"A storm-forged staff crackling with enough power to punish entire battlefields.","stats":{"damage":9.75},"hasUlt":true,"hasTransform":false,"tags":["staff"],"ult":{"displayName":"Amaru / Raigo","description":"Transform into lightning (Amaru) or summon divine thunder (Raigo — requires Thunder Drums accessory).","cooldown":40,"dmgMulti":20,"extra":"Raigo: 60s CD · 220× DMG · requires Thunder Drums"}},{"name":"Golden Hook Style","displayName":"Golden Hook Style","rarity":"mythical","description":"A ruthless desert fighting style that tears through enemies.","stats":{"damage":10.75,"ultGain":1.1},"hasUlt":true,"hasTransform":false,"tags":["style"],"ult":{"displayName":"Sables","description":"Release a fast-moving sand tornado that rips through everything in its path.","cooldown":40,"dmgMulti":20},"specials":[{"name":"Sand Tithe","description":"Each hit reaps +10% BONUS ultimate charge."}]}],"statMeta":{"damage":{"label":"DMG","color":"#ff5e5e","p":"+","s":"%"},"critDamage":{"label":"Crit DMG","color":"#ff9f43","p":"+","s":"%"},"critChance":{"label":"Crit %","color":"#ffd32a","p":"+","s":"%"},"attackSpeed":{"label":"ATK SPD","color":"#ff6b9d","p":"+","s":"%"},"ultEffectiveness":{"label":"ULT DMG","color":"#a78bfa","p":"+","s":"%"},"ultGain":{"label":"ULT Charge","color":"#818cf8","p":"+","s":"%"},"ultCost":{"label":"ULT Cost","color":"#34d399","p":"-","s":"%"},"ultCooldown":{"label":"ULT CD","color":"#2dd4bf","p":"-","s":"%"},"dodgeChance":{"label":"Dodge","color":"#38bdf8","p":"+","s":"%"},"enemyBossDamage":{"label":"Boss DMG","color":"#fb923c","p":"+","s":"%"},"health":{"label":"HP","color":"#4ade80","p":"+","s":"%"},"defense":{"label":"DEF","color":"#22d3ee","p":"+","s":"%"},"walkSpeed":{"label":"Walk SPD","color":"#67e8f9","p":"+","s":"%"},"luck":{"label":"Luck","color":"#facc15","p":"+","s":"%"},"drops":{"label":"Drops","color":"#c084fc","p":"+","s":"%"},"cash":{"label":"Cash","color":"#86efac","p":"+","s":"%"},"xpGain":{"label":"EXP","color":"#6ee7b7","p":"+","s":"%"}}};
const STATE={relics:{lv:1,filter:'all'},weapons:{lv:1,filter:'all'},accessories:{lv:1,filter:'all'},loadouts:{lv:1,filter:'damage'}};
const TIERS=[{id:'SS',label:'SS',desc:'Best items for DMG / CRIT / DROP / LUCK'},{id:'SP',label:'S+',desc:'Second best items in each category'},{id:'S',label:'S',desc:'Third best items in each category'},{id:'A',label:'A',desc:'Strong alternatives'},{id:'B',label:'B',desc:'Situational choices'},{id:'C',label:'C',desc:'Weak or niche items'}];
const LOADOUTS=[
 {id:'damage',label:'DAMAGE',icon:'⚔️',keys:['damage','critDamage','drops','luck'],desc:'Prioritizes raw damage, then Crit DMG, Drops, and Luck as tie-breakers.'},
 {id:'drops',label:'DROP',icon:'💎',keys:['drops','luck','damage','critDamage'],desc:'Prioritizes drops, with luck and damage as support stats.'},
 {id:'luck',label:'LUCK',icon:'🍀',keys:['luck','drops','damage','critDamage'],desc:'Prioritizes luck for rare rolls, with drops as the second priority.'},
 {id:'xpGain',label:'EXP',icon:'📈',keys:['xpGain','luck','drops','damage'],desc:'Prioritizes EXP, then luck and drops for grinding.'},
 {id:'cash',label:'CASH',icon:'💰',keys:['cash','drops','luck','damage'],desc:'Prioritizes cash, with drops and luck helping the farm.'},
 {id:'defense',label:'DEFENSE',icon:'🛡️',keys:['defense','health','dodgeChance','damage'],desc:'Prioritizes defense and survivability.'},
 {id:'critical',label:'CRITICAL',icon:'🎯',keys:['critChance','critDamage','damage','drops','luck'],desc:'Prioritizes Critical Chance > Crit DMG > DMG.'},
];
const META=DATA.statMeta;
function meta(k){return META[k]||{label:k,color:'#9ca3af',p:'+',s:'%'}}
function fmt(v){const r=Math.round(v*10000)/10000;return r%1===0?r:parseFloat(r.toFixed(4))}
function clamp(v){return Math.min(15,Math.max(1,parseInt(v)||1))}
function scaledStats(item,lv,type){const stats=item.stats||{};let m=1;if(type==='accessories')m=1+Math.pow((lv-1)/20,1.1);else if(type==='relics')m=1+Math.pow((lv-1)/30,1.1);const out={};for(const [k,v] of Object.entries(stats))out[k]=Math.round(v*m*10000)/10000;return out}
function weaponDmg(wpn,lv){const base=wpn.stats.damage||0;const avg=15;return Math.max(Math.floor(avg*base*Math.pow(1+(lv-1)*0.045,1.4)),Math.max(base,5))}
function statValue(item,lv,type,key){if(type==='weapons'){if(key==='damage')return (item.stats.damage||0)*10 + weaponDmg(item,lv)/10 + (item.hasUlt?8:0) + (item.hasTransform?8:0) + ((item.stats.ultGain||0)*4);return 0}return scaledStats(item,lv,type)[key]||0}
function buildValue(item,lv,type,keys){let total=0;const weights=[1000,100,10,1,.5];keys.forEach((k,i)=>total+=statValue(item,lv,type,k)*(weights[i]||1));if(type==='weapons'&&item.specials)total*=1.04;return total}
function itemValue(item,lv,type){const archetypes=[['damage','critDamage','drops','luck'],['critChance','critDamage','damage'],['drops','luck','damage'],['luck','drops','damage'],['xpGain','luck','drops'],['cash','drops','luck'],['defense','health','dodgeChance']];return Math.max(...archetypes.map(keys=>buildValue(item,lv,type,keys))) }
function tierByRank(idx,total){const p=(idx+1)/total;if(p<=.16)return'SS';if(p<=.32)return'SP';if(p<=.50)return'S';if(p<=.68)return'A';if(p<=.84)return'B';return'C'}
function statRows(stats){return Object.entries(stats).map(([k,v])=>{const m=meta(k);return '<div class="sr"><span class="sn"><span class="sd" style="background:'+m.color+'"></span>'+m.label+'</span><span class="sv" style="color:'+m.color+'">'+m.p+fmt(v)+m.s+'</span></div>'}).join('')}
function legend(){return '<div class="lg"><div class="lg-ttl">Stat color key</div><div class="lg-grid">'+Object.entries(META).map(([,m])=>'<div class="lg-item"><span class="lg-dot" style="background:'+m.color+'"></span><span>'+m.label+'</span></div>').join('')+'</div></div>'}
function controls(type,label,filters){const st=STATE[type];return legend()+'<div class="lv-bar"><span class="lv-lbl">'+label+' Level</span><input type="range" class="lv-sl" data-lv="'+type+'" min="1" max="15" step="1" value="'+st.lv+'"><input type="number" class="lv-inp" data-lvinp="'+type+'" min="1" max="15" value="'+st.lv+'"><span class="lv-note">Drag to adjust · max 15</span></div><div class="flt" data-filter="'+type+'">'+filters.map(f=>'<button class="flt-btn '+(st.filter===f.v?'on':'')+'" data-v="'+f.v+'">'+f.label+'</button>').join('')+'</div>'}
function filterItems(items,type){const f=STATE[type].filter;if(f==='all')return items;if(type==='relics')return items.filter(x=>(x.affiliations||[]).includes(f));if(type==='accessories')return items.filter(x=>x.type===f);if(type==='weapons'){if(f==='has-ult')return items.filter(x=>x.hasUlt);if(f==='no-ult')return items.filter(x=>!x.hasUlt)}return items}
function renderList(target,items,type){const lv=STATE[type].lv;const scored=filterItems(items,type).map(x=>({...x,_value:itemValue(x,lv,type)})).sort((a,b)=>b._value-a._value);const total=Math.max(1,scored.length);const grouped={};TIERS.forEach(t=>grouped[t.id]=[]);scored.forEach((x,i)=>grouped[tierByRank(i,total)].push(x));target.innerHTML+=TIERS.map(t=>{const arr=grouped[t.id];if(!arr.length)return'';return '<div class="tb t-'+t.id+'"><div class="tb-hd"><div class="tb-badge">'+t.label+'</div><span class="tb-desc">'+t.desc+'</span><div class="tb-line"></div></div><div class="cg">'+arr.map(x=>card(x,type,lv)).join('')+'</div></div>'}).join('')}
function card(item,type,lv){if(type==='weapons')return weaponCard(item,lv);const st=scaledStats(item,lv,type);const tags=type==='relics'?(item.affiliations||[]).map(a=>'<span class="ac-aff">'+a+'</span>').join(''):'<span class="ac-tp">'+item.type+'</span>';return '<div class="ac"><div class="ac-nm">'+item.name+'</div><div class="ac-mt">'+tags+'<span class="ac-rar r-'+item.rarity+'">'+item.rarity+'</span></div>'+(item.description?'<div class="ac-dsc">'+item.description+'</div>':'')+'<div class="sl">'+(Object.keys(st).length?statRows(st):'<div class="ns">Cosmetic only / no stats</div>')+'</div></div>'}
function weaponCard(wpn,lv){const dmgColor=meta('damage').color;const ult=wpn.ult?'<div class="ult-box"><div class="ult-ttl">⚡ Ultimate</div><div class="ult-nm">'+wpn.ult.displayName+'</div><div class="ult-dsc">'+wpn.ult.description+'</div><div class="ult-cd">CD: '+wpn.ult.cooldown+'s · '+wpn.ult.dmgMulti+'× DMG</div>'+(wpn.ult.extra?'<div class="ult-xtra">'+wpn.ult.extra+'</div>':'')+'</div>':'';const specials=wpn.specials?'<div class="sp-box">'+wpn.specials.map(sp=>'<div class="sp-item">★ '+sp.name+' — '+sp.description+'</div>').join('')+'</div>':'';const tf=wpn.transform?'<div class="tf-box"><div class="tf-ttl">Transform</div>+'+wpn.transform.buffs.damage+'% DMG · +'+wpn.transform.buffs.attackSpeed+'% ATK SPD · '+wpn.transform.duration+'s</div>':'';return '<div class="ac"><div class="ac-nm">'+(wpn.displayName||wpn.name)+'</div><div class="ac-mt"><span class="ac-rar r-'+wpn.rarity+'">'+wpn.rarity+'</span>'+(wpn.tags||[]).map(t=>'<span class="ac-tag">'+t+'</span>').join('')+'</div><div class="ac-dsc">'+wpn.description+'</div><div class="sl"><div class="sr"><span class="sn"><span class="sd" style="background:'+dmgColor+'"></span>DMG Mult</span><span class="sv" style="color:'+dmgColor+'">×'+fmt(wpn.stats.damage||0)+'</span></div>'+(wpn.stats.ultGain?'<div class="sr"><span class="sn"><span class="sd" style="background:'+meta('ultGain').color+'"></span>ULT Charge</span><span class="sv" style="color:'+meta('ultGain').color+'">+'+fmt(wpn.stats.ultGain)+'</span></div>':'')+'<div class="sr"><span class="sn"><span class="sd" style="background:'+dmgColor+'"></span>Scaled DMG lv'+lv+'</span><span class="sv" style="color:'+dmgColor+'">'+weaponDmg(wpn,lv)+'</span></div></div>'+ult+specials+tf+'</div>'}
function renderRelics(){const el=document.getElementById('pane-relics');el.innerHTML=controls('relics','Relic',[{v:'all',label:'All'},{v:'physical',label:'Physical'},{v:'magic',label:'Magic'}]);renderList(el,DATA.relics,'relics')}
function renderWeapons(){const el=document.getElementById('pane-weapons');el.innerHTML=controls('weapons','Weapon',[{v:'all',label:'All'},{v:'has-ult',label:'Has Ultimate'},{v:'no-ult',label:'No Ultimate'}]);renderList(el,DATA.weapons,'weapons')}
function renderAccessories(){const el=document.getElementById('pane-accessories');el.innerHTML=controls('accessories','Item',[{v:'all',label:'All'},{v:'outfit',label:'Outfit'},{v:'head',label:'Head'},{v:'waist',label:'Waist'}]);renderList(el,DATA.accessories,'accessories')}
function loadoutControls(){const st=STATE.loadouts;return legend()+'<div class="lv-bar"><span class="lv-lbl">Loadout Level</span><input type="range" class="lv-sl" data-lv="loadouts" min="1" max="15" step="1" value="'+st.lv+'"><input type="number" class="lv-inp" data-lvinp="loadouts" min="1" max="15" value="'+st.lv+'"><span class="lv-note">Shows Accessories + Best Relic · You can use 14 relics at max</span></div><div class="subnav" data-filter="loadouts">'+LOADOUTS.map(l=>'<button class="sub-btn '+(st.filter===l.id?'on':'')+'" data-v="'+l.id+'">'+l.label+'</button>').join('')+'</div><div id="loadout-box"></div>'}
function pickTop(items,lv,type,keys,count,slot){let pool=items;if(slot)pool=pool.filter(x=>x.type===slot);return pool.map(x=>({...x,_value:buildValue(x,lv,type,keys)})).filter(x=>x._value>0).sort((a,b)=>b._value-a._value).slice(0,count)}
function itemMini(item,type,lv,keys){if(!item)return '<div class="lac"><div class="ns">No matching item</div></div>';const st=type==='weapons'?{}:scaledStats(item,lv,type);const title=type==='weapons'?(item.displayName||item.name):item.name;const sub=type==='accessories'?item.type:(type==='relics'?(item.affiliations||[]).join(', '):'weapon');const stats=type==='weapons'?'<span class="sp" style="color:'+meta('damage').color+';border-color:'+meta('damage').color+'55;background:'+meta('damage').color+'18"><span class="sp-dot" style="background:'+meta('damage').color+'"></span>DMG ×'+fmt(item.stats.damage||0)+'</span>':Object.entries(st).map(([k,v])=>pill(k,v,keys.includes(k))).join('');return '<div class="lac"><div class="lac-nm"><span>'+title+'</span><span class="ac-rar r-'+item.rarity+'" style="font-size:9px">'+item.rarity+'</span></div><div class="ac-mt" style="margin-bottom:6px"><span class="ac-tag">'+sub+'</span></div><div class="lac-st">'+(stats||'<span class="ns">No useful stat for this build</span>')+'</div></div>'}
function pill(k,v,hi){const m=meta(k);return '<span class="sp" style="color:'+m.color+';border-color:'+m.color+(hi?'55':'22')+';background:'+m.color+(hi?'1a':'0a')+'"><span class="sp-dot" style="background:'+m.color+'"></span>'+m.label+' '+m.p+fmt(v)+m.s+'</span>'}
function renderLoadouts(){const el=document.getElementById('pane-loadouts');el.innerHTML=loadoutControls();const l=LOADOUTS.find(x=>x.id===STATE.loadouts.filter)||LOADOUTS[0];const lv=STATE.loadouts.lv;const ac=meta(l.keys[0]).color;const outfit=pickTop(DATA.accessories,lv,'accessories',l.keys,1,'outfit')[0];const head=pickTop(DATA.accessories,lv,'accessories',l.keys,1,'head')[0];const waist=pickTop(DATA.accessories,lv,'accessories',l.keys,1,'waist')[0];const bestRelic=pickTop(DATA.relics,lv,'relics',l.keys,1)[0];const relics=bestRelic?[bestRelic]:[];const all=[outfit,head,waist,bestRelic].filter(Boolean);const totals={};all.forEach(item=>{const type=item.type?'accessories':'relics';for(const [k,v]of Object.entries(scaledStats(item,lv,type)))totals[k]=(totals[k]||0)+v});const box=document.getElementById('loadout-box');box.innerHTML='<div class="lc"><div class="lc-hd"><div class="lc-ico" style="background:'+ac+'18;border:1px solid '+ac+'33">'+l.icon+'</div><div class="lc-tw"><div class="lc-ttl" style="color:'+ac+'">'+l.label+'</div><div class="lc-sub">'+l.desc+'</div></div></div><div class="lc-bd"><div class="sg"><div class="sw"><div class="sl-lbl">Accessory - Outfit</div>'+itemMini(outfit,'accessories',lv,l.keys)+'</div><div class="sw"><div class="sl-lbl">Accessory - Head</div>'+itemMini(head,'accessories',lv,l.keys)+'</div><div class="sw"><div class="sl-lbl">Accessory - Waist</div>'+itemMini(waist,'accessories',lv,l.keys)+'</div><div class="sw"><div class="sl-lbl">Best Relic</div>'+itemMini(bestRelic,'relics',lv,l.keys)+'<div class="relic-note">You can use 14 relics at max</div></div></div><div class="ts"><div class="ts-ttl">Combined stats</div><div class="tp">'+Object.entries(totals).sort((a,b)=>(l.keys.indexOf(a[0])<0?99:l.keys.indexOf(a[0]))-(l.keys.indexOf(b[0])<0?99:l.keys.indexOf(b[0]))).map(([k,v])=>{const m=meta(k),hi=l.keys.includes(k);return '<span class="tpp" style="color:'+m.color+';border-color:'+m.color+(hi?'55':'22')+';background:'+m.color+(hi?'18':'0a')+'"><span class="tpp-dot" style="background:'+m.color+'"></span>'+m.label+' '+m.p+fmt(v)+m.s+'</span>'}).join('')+'</div></div></div></div>'}
function renderAll(){renderRelics();renderWeapons();renderAccessories();renderLoadouts();bindDynamic()}
function bindDynamic(){document.querySelectorAll('[data-lv]').forEach(sl=>{sl.oninput=e=>{const key=e.target.dataset.lv;STATE[key].lv=parseInt(e.target.value);const inp=document.querySelector('[data-lvinp="'+key+'"]');if(inp)inp.value=STATE[key].lv};sl.onchange=()=>renderAll();sl.onpointerup=()=>renderAll();sl.onkeyup=e=>{if(['ArrowLeft','ArrowRight','Home','End'].includes(e.key))renderAll()}});document.querySelectorAll('[data-lvinp]').forEach(inp=>{inp.onblur=e=>{STATE[e.target.dataset.lvinp].lv=clamp(e.target.value);renderAll()};inp.onkeydown=e=>{if(e.key==='Enter'){e.preventDefault();e.target.blur()}}});document.querySelectorAll('[data-filter]').forEach(box=>box.onclick=e=>{const b=e.target.closest('.flt-btn,.sub-btn');if(!b)return;STATE[box.dataset.filter].filter=b.dataset.v;renderAll()})}
document.getElementById('main-nav').addEventListener('click',e=>{const b=e.target.closest('.nav-tab');if(!b)return;document.querySelectorAll('.nav-tab').forEach(x=>x.classList.toggle('on',x===b));document.querySelectorAll('.pane').forEach(x=>x.classList.remove('on'));document.getElementById('pane-'+b.dataset.tab).classList.add('on')});
renderAll();
</script>
