<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Warriors 3 Database</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#070912;
  --surface:#111622;
  --surface2:#171d2b;
  --border:rgba(255,255,255,.1);
  --border2:rgba(255,255,255,.16);
  --text:#f8fafc;
  --muted:#a9b4c7;
  --purple:#8b5cf6;
  --blue:#38bdf8;
  --gold:#facc15;
  --red:#f87171;
  --green:#34d399;
  --ft:Inter,Arial,sans-serif;
  --fb:Inter,Arial,sans-serif;
}
*{
  box-sizing:border-box;
}
html,body{
  min-height:100%;
  margin:0;
  overflow-x:hidden;
  overflow-y:auto;
}
body{
  font-family:var(--ft);
  color:var(--text);
  background:#070912;
}
body::before{
  content:"";
  position:fixed;
  inset:0;
  z-index:-3;
  pointer-events:none;
  background:
    radial-gradient(circle at 18% 15%,rgba(139,92,246,.22),transparent 28%),
    radial-gradient(circle at 82% 17%,rgba(56,189,248,.16),transparent 30%),
    radial-gradient(circle at 50% 92%,rgba(99,102,241,.12),transparent 34%),
    linear-gradient(180deg,#070912,#0a0d18 48%,#06070d);
}
body::after{
  content:"";
  position:fixed;
  inset:-20%;
  z-index:-2;
  pointer-events:none;
  opacity:.34;
  background:
    linear-gradient(90deg,rgba(255,255,255,.04) 1px,transparent 1px),
    linear-gradient(rgba(255,255,255,.04) 1px,transparent 1px),
    radial-gradient(circle,rgba(139,92,246,.20) 0 1px,transparent 2px);
  background-size:64px 64px,64px 64px,140px 140px;
  animation:bgDrift 34s linear infinite;
}
.bg-orb-one,.bg-orb-two{
  position:fixed;
  width:360px;
  height:360px;
  border-radius:50%;
  pointer-events:none;
  z-index:-1;
  filter:blur(48px);
  opacity:.16;
}
.bg-orb-one{
  left:7%;
  top:38%;
  background:var(--purple);
  animation:orbOne 18s ease-in-out infinite alternate;
}
.bg-orb-two{
  right:8%;
  bottom:12%;
  background:var(--blue);
  animation:orbTwo 22s ease-in-out infinite alternate;
}
#root{
  min-height:100vh;
  padding-bottom:44px;
}
.hd{
  min-height:200px;
  padding:32px 20px 24px;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:10px;
  text-align:center;
  border-bottom:1px solid rgba(255,255,255,.08);
  background:
    radial-gradient(circle at 45% 10%,rgba(139,92,246,.22),transparent 34%),
    radial-gradient(circle at 62% 18%,rgba(56,189,248,.14),transparent 32%),
    linear-gradient(180deg,rgba(139,92,246,.055),transparent 72%);
}
.hero-pill{
  display:inline-flex;
  align-items:center;
  gap:7px;
  padding:6px 12px;
  border-radius:999px;
  background:rgba(139,92,246,.12);
  border:1px solid rgba(139,92,246,.35);
  color:#c4b5fd;
  font-size:11px;
  font-weight:800;
}
.hero-pill::before{
  content:"✦";
}
.hd h1{
  margin:0;
  font-size:clamp(30px,3.8vw,48px);
  line-height:1;
  font-weight:950;
  letter-spacing:-.04em;
  background:linear-gradient(135deg,#fff 20%,#c4b5fd 55%,#7dd3fc 100%);
  -webkit-background-clip:text;
  background-clip:text;
  -webkit-text-fill-color:transparent;
}
.hd p{
  max-width:700px;
  margin:0;
  color:#c0c8d8;
  font-size:14px;
  line-height:1.45;
}
.feedback-top{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:10px;
  margin-top:4px;
}
.feedback-button,.update-button{
  min-width:116px;
  padding:9px 14px;
  border-radius:12px;
  border:1px solid rgba(255,255,255,.13);
  background:rgba(255,255,255,.045);
  color:#fff;
  font-family:var(--ft);
  font-size:13px;
  font-weight:800;
  letter-spacing:.02em;
  cursor:pointer;
  transition:.18s ease;
}
.feedback-button:hover,.update-button:hover{
  transform:translateY(-1px);
  border-color:rgba(139,92,246,.55);
  background:rgba(139,92,246,.13);
}
.nav{
  position:sticky;
  top:0;
  z-index:40;
  display:flex;
  justify-content:center;
  gap:8px;
  padding:10px 14px;
  border-bottom:1px solid rgba(139,92,246,.16);
  background:rgba(7,9,18,.82);
  backdrop-filter:blur(16px);
  overflow-x:auto;
  overflow-y:hidden;
  scrollbar-width:none;
}
.nav::-webkit-scrollbar{
  display:none;
}
.nav-tab{
  flex:0 0 auto;
  padding:8px 12px;
  border-radius:12px;
  border:1px solid transparent;
  background:transparent;
  color:#aeb8c8;
  font-family:var(--ft);
  font-size:13px;
  font-weight:850;
  cursor:pointer;
  transition:.18s ease;
}
.nav-tab:hover{
  color:#fff;
  background:rgba(139,92,246,.10);
}
.nav-tab.on{
  color:#fff;
  background:linear-gradient(135deg,var(--purple),var(--blue));
  box-shadow:0 12px 32px rgba(139,92,246,.22);
}
.nav-tab-disabled{
  opacity:.45;
  cursor:not-allowed;
  position:relative;
}
.nav-tab-disabled:hover{
  transform:none;
  color:#aeb8c8;
  background:transparent;
}
.nav-tab-disabled::after{
  content:"Coming soon";
  position:absolute;
  left:50%;
  bottom:-32px;
  transform:translateX(-50%) translateY(4px);
  opacity:0;
  pointer-events:none;
  white-space:nowrap;
  padding:6px 9px;
  border-radius:8px;
  background:rgba(10,13,20,.96);
  border:1px solid rgba(255,255,255,.14);
  color:#facc15;
  font-size:11px;
  font-weight:800;
  transition:.16s ease;
}
.nav-tab-disabled:hover::after{
  opacity:1;
  transform:translateX(-50%) translateY(0);
}
.pane{
  display:none;
  width:100%;
  max-width:1180px;
  margin:0 auto;
  padding:22px 14px 46px;
}
.pane.on{
  display:block;
}
.lg,.lv-bar,.tb,.lc,.extra-card,.extra-row,.drop-card,.modifier-card,.ac,.lac{
  border:1px solid rgba(255,255,255,.10);
  background:linear-gradient(180deg,rgba(255,255,255,.04),rgba(255,255,255,.018)),rgba(17,22,34,.94);
  border-radius:16px;
  box-shadow:0 14px 36px rgba(0,0,0,.24);
  transition:transform .18s ease,border-color .18s ease,background .18s ease,box-shadow .18s ease;
}
.lg:hover,.lv-bar:hover,.tb:hover,.lc:hover,.extra-card:hover,.extra-row:hover,.drop-card:hover,.modifier-card:hover,.ac:hover,.lac:hover{
  transform:translateY(-2px);
  border-color:rgba(139,92,246,.34);
  background:linear-gradient(180deg,rgba(139,92,246,.055),rgba(56,189,248,.025)),rgba(18,23,36,.98);
  box-shadow:0 20px 48px rgba(0,0,0,.32);
}
.lg{
  padding:14px;
  margin-bottom:14px;
}
.lg-ttl,.lv-lbl,.sl-lbl,.ts-ttl{
  font-size:11px;
  font-weight:850;
  letter-spacing:.14em;
  text-transform:uppercase;
  color:#b7c2d6;
}
.lg-row{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  margin-top:8px;
}
.lg-item{
  display:flex;
  align-items:center;
  gap:5px;
  font-size:12px;
  color:#cbd5e1;
}
.dot,.sd{
  width:7px;
  height:7px;
  border-radius:50%;
  display:inline-block;
}
.lv-bar{
  display:grid;
  grid-template-columns:auto 1fr 70px auto;
  align-items:center;
  gap:12px;
  padding:13px;
  margin-bottom:14px;
}
.lv-sl{
  width:100%;
  accent-color:var(--purple);
}
.lv-inp{
  width:70px;
  min-height:34px;
  border:1px solid rgba(255,255,255,.11);
  border-radius:10px;
  background:rgba(255,255,255,.05);
  color:#fff;
  text-align:center;
  font-family:var(--ft);
  font-size:15px;
  font-weight:850;
}
.lv-note{
  color:#96a2b8;
  font-size:11px;
  white-space:nowrap;
}
.flt,.subnav,.mini-tabs{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:9px;
  margin:14px 0;
}
.flt-btn,.sub-btn,.mini-tab{
  padding:8px 13px;
  border-radius:999px;
  border:1px solid rgba(255,255,255,.10);
  background:rgba(255,255,255,.055);
  color:#a8b2c3;
  font-family:var(--ft);
  font-size:13px;
  font-weight:850;
  cursor:pointer;
  transition:.18s ease;
}
.flt-btn.on,.sub-btn.on,.mini-tab.on{
  background:linear-gradient(135deg,var(--purple),var(--blue));
  border-color:rgba(255,255,255,.14);
  color:#fff;
}
.tb{
  padding:14px;
  margin-bottom:16px;
}
.tb-hd{
  display:flex;
  align-items:center;
  gap:10px;
  margin-bottom:14px;
}
.tb-badge{
  padding:6px 10px;
  border-radius:999px;
  background:rgba(139,92,246,.16);
  border:1px solid rgba(139,92,246,.36);
  color:#c4b5fd;
  font-size:12px;
  font-weight:900;
}
.tb-desc{
  color:#b8c3d6;
  font-size:13px;
}
.tb-line{
  flex:1;
  height:1px;
  background:rgba(255,255,255,.08);
}
.cg,.extra-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
  gap:12px;
}
.ac,.extra-card,.drop-card,.modifier-card{
  min-height:auto;
  padding:14px;
}
.ac-nm,.extra-title,.drop-name,.modifier-title,.extra-row-title{
  color:#fff;
  font-size:17px;
  font-weight:900;
  letter-spacing:-.02em;
  margin-bottom:6px;
}
.ac-mt,.drop-meta,.modifier-lines{
  display:flex;
  align-items:center;
  flex-wrap:wrap;
  gap:6px;
  margin-bottom:8px;
}
.ac-rar,.ac-tag,.ac-aff,.ac-tp,.drop-pill,.modifier-pill{
  display:inline-flex;
  align-items:center;
  gap:5px;
  padding:4px 7px;
  border-radius:8px;
  border:1px solid rgba(255,255,255,.12);
  background:rgba(255,255,255,.045);
  color:#cbd5e1;
  font-size:10px;
  font-weight:900;
  text-transform:uppercase;
}
.r-rare{color:#60a5fa;border-color:rgba(96,165,250,.38)}
.r-epic{color:#c084fc;border-color:rgba(192,132,252,.38)}
.r-legendary{color:#facc15;border-color:rgba(250,204,21,.42)}
.r-mythical{color:#fb7185;border-color:rgba(251,113,133,.45)}
.r-exclusive{color:#f0abfc;border-color:rgba(240,171,252,.45)}
.ac-dsc,.extra-sub,.modifier-desc,.drop-line,.extra-row-line,.extra-row-source{
  color:#aeb9cb;
  font-size:13px;
  line-height:1.5;
}
.sl{
  display:flex;
  flex-direction:column;
  gap:6px;
  margin-top:8px;
}
.sr,.extra-stat{
  display:flex;
  justify-content:space-between;
  gap:10px;
  padding-top:6px;
  border-top:1px solid rgba(255,255,255,.07);
  font-family:var(--ft);
  font-size:13px;
}
.sn{
  color:#b8c3d6;
}
.sv,.extra-stat span:last-child,.ult-cd{
  font-family:Inter,Arial,sans-serif;
  font-variant-numeric:tabular-nums;
  font-weight:850;
}
.ns{
  color:#94a3b8;
  font-size:13px;
}
.ult-box,.tf-box,.sp-item,.weapon-note,.drop-line{
  margin-top:8px;
  padding:9px;
  border-radius:10px;
  border:1px solid rgba(255,255,255,.08);
  background:rgba(255,255,255,.035);
}
.ult-ttl,.tf-ttl{
  font-weight:900;
  color:#c4b5fd;
  margin-bottom:4px;
}
.ult-nm{
  color:#fff;
  font-weight:900;
}
.ult-dsc,.ult-xtra,.weapon-note{
  color:#b8c3d6;
  font-size:12px;
  line-height:1.45;
}
.load-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
  gap:12px;
}
.lc{
  overflow:hidden;
}
.lc-hd{
  padding:14px;
  border-bottom:1px solid rgba(255,255,255,.08);
}
.lc-ttl{
  color:#fff;
  font-weight:900;
}
.lc-sub{
  color:#94a3b8;
  font-size:12px;
  margin-top:4px;
}
.lc-sec{
  padding:14px;
}
.lc-sec h4{
  margin:0 0 8px;
  color:#c4b5fd;
}
.mini{
  display:flex;
  justify-content:space-between;
  gap:10px;
  padding:7px 0;
  border-top:1px solid rgba(255,255,255,.06);
}
.mini-name{
  color:#fff;
  font-weight:800;
}
.mini-meta{
  color:#94a3b8;
  font-size:12px;
}
.footer-credit{
  position:fixed;
  left:0;
  right:0;
  bottom:0;
  z-index:50;
  padding:8px 10px;
  text-align:center;
  background:rgba(7,9,18,.82);
  border-top:1px solid rgba(255,255,255,.08);
  backdrop-filter:blur(12px);
  pointer-events:none;
  font-size:12px;
  color:#aeb9cb;
  font-weight:700;
}
.made-zenoir{
  color:#c4b5fd;
}
.made-novaz{
  color:#7dd3fc;
}
.info-note{
  margin-bottom:12px;
  padding:10px 12px;
  border-radius:12px;
  border:1px solid rgba(250,204,21,.28);
  background:rgba(250,204,21,.08);
  color:#facc15;
  text-align:center;
  font-size:13px;
  font-weight:800;
}
.shiny-toggle-wrap{
  display:flex;
  justify-content:center;
  align-items:center;
  gap:8px;
  margin-bottom:14px;
}
.shiny-toggle,.shiny-info{
  padding:8px 12px;
  border-radius:999px;
  border:1px solid rgba(250,204,21,.35);
  background:rgba(250,204,21,.10);
  color:#facc15;
  font-size:12px;
  font-weight:900;
}
.shiny-toggle{
  cursor:pointer;
}
.shiny-badge{
  display:inline-flex;
  margin-left:6px;
  padding:2px 6px;
  border-radius:999px;
  border:1px solid rgba(250,204,21,.45);
  color:#facc15;
  font-size:10px;
  font-weight:900;
}
.drop-rarity-title{
  display:flex;
  align-items:center;
  gap:10px;
  margin:16px 0 8px;
}
.drop-rarity-title span{
  font-size:14px;
  font-weight:900;
  letter-spacing:.08em;
  text-transform:uppercase;
}
.drop-rarity-title::after{
  content:"";
  flex:1;
  height:1px;
  background:rgba(255,255,255,.09);
}
.drop-sources{
  display:flex;
  flex-direction:column;
  gap:6px;
}
.modifier-card{
  min-height:145px;
}
.modifier-pill{
  color:var(--mod-color,#c4b5fd);
  border-color:var(--mod-border,rgba(139,92,246,.35));
  background:var(--mod-soft,rgba(139,92,246,.10));
}
.update-layer,.feedback-layer,.feedback-modal{
  position:fixed;
  inset:0;
  z-index:9999;
  display:none;
  width:100%;
  height:100vh;
  height:100dvh;
  padding:22px;
  overflow:auto;
  overscroll-behavior:contain;
  background:rgba(4,6,14,.78);
}
.update-layer.open,.feedback-layer.open,.feedback-modal.on{
  display:grid;
  place-items:center;
}
.update-panel,.feedback-panel,.feedback-box,.feedback-card{
  border-radius:22px;
  border:1px solid rgba(255,255,255,.13);
  background:linear-gradient(180deg,rgba(20,24,36,.98),rgba(9,12,19,.98));
  box-shadow:0 30px 90px rgba(0,0,0,.62),0 0 45px rgba(139,92,246,.13);
}
.update-panel{
  width:min(640px,calc(100vw - 44px));
  max-height:min(720px,calc(100dvh - 44px));
  display:grid;
  grid-template-rows:auto auto minmax(0,1fr) auto;
  overflow:hidden;
}
.update-panel h2{
  margin:0;
  padding:20px 22px 6px;
  font-size:24px;
  font-weight:900;
}
.update-version{
  padding:0 22px 12px;
  color:#93c5fd;
  font-size:12px;
  font-weight:800;
}
.update-list{
  min-height:0;
  overflow-y:auto;
  overflow-x:hidden;
  padding:0 22px 16px;
  display:flex;
  flex-direction:column;
  gap:10px;
  scrollbar-width:thin;
  scrollbar-color:#8b5cf6 rgba(255,255,255,.06);
}
.update-list::-webkit-scrollbar{
  width:9px;
}
.update-list::-webkit-scrollbar-track{
  background:rgba(255,255,255,.05);
  border-radius:999px;
}
.update-list::-webkit-scrollbar-thumb{
  background:linear-gradient(180deg,var(--purple),var(--blue));
  border-radius:999px;
}
.update-item{
  position:relative;
  flex:0 0 auto;
  padding:13px 82px 13px 14px;
  border-radius:15px;
  border:1px solid rgba(255,255,255,.09);
  background:rgba(255,255,255,.045);
}
.update-item > div:first-of-type{
  color:#fff;
  font-size:14px;
  font-weight:850;
  margin-bottom:6px;
}
.update-subitem{
  color:#b8c3d8;
  font-size:13px;
  line-height:1.35;
}
.update-tag{
  position:absolute;
  top:11px;
  right:12px;
  padding:4px 8px;
  border-radius:999px;
  font-size:10px;
  font-weight:900;
}
.update-tag.ui{background:rgba(139,92,246,.20);color:#c4b5fd;border:1px solid rgba(139,92,246,.42)}
.update-tag.balance{background:rgba(250,204,21,.16);color:#facc15;border:1px solid rgba(250,204,21,.40)}
.update-tag.new{background:rgba(56,189,248,.16);color:#7dd3fc;border:1px solid rgba(56,189,248,.40)}
.update-tag.bug{background:rgba(248,113,113,.16);color:#fca5a5;border:1px solid rgba(248,113,113,.40)}
.update-close{
  min-height:46px;
  border:0;
  border-top:1px solid rgba(255,255,255,.08);
  border-radius:0 0 22px 22px;
  background:rgba(255,255,255,.045);
  color:#e5e7eb;
  font-weight:850;
  cursor:pointer;
}
.feedback-panel,.feedback-box,.feedback-card{
  width:min(560px,calc(100vw - 44px));
  max-height:calc(100dvh - 44px);
  overflow-y:auto;
  padding:18px;
}
.feedback-head{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
  margin-bottom:14px;
}
.feedback-title,.feedback-panel h2,.feedback-box h2{
  margin:0;
  font-size:24px;
  font-weight:900;
  color:#fff;
}
.feedback-close{
  width:34px;
  height:34px;
  border-radius:10px;
  border:1px solid rgba(255,255,255,.12);
  background:rgba(255,255,255,.06);
  color:#fff;
  cursor:pointer;
}
.feedback-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
}
.feedback-field{
  display:flex;
  flex-direction:column;
  gap:5px;
}
.feedback-field.full{
  grid-column:1/-1;
}
.feedback-field label,.feedback-panel label,.feedback-box label{
  color:#b8c3d8;
  font-size:11px;
  font-weight:850;
}
.feedback-field select,.feedback-field input,.feedback-field textarea,.feedback-panel select,.feedback-panel input,.feedback-panel textarea,.feedback-box select,.feedback-box input,.feedback-box textarea{
  width:100%;
  min-height:40px;
  padding:10px 11px;
  border-radius:12px;
  border:1px solid rgba(255,255,255,.12);
  background:#151b2a;
  color:#fff;
  font-family:var(--ft);
  font-size:14px;
  font-weight:600;
  outline:none;
  color-scheme:dark;
}
.feedback-field textarea,.feedback-panel textarea,.feedback-box textarea{
  min-height:120px;
  resize:vertical;
}
.feedback-actions{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
  margin-top:14px;
}
.feedback-submit,.feedback-send{
  min-height:42px;
  border:0;
  border-radius:12px;
  background:linear-gradient(135deg,var(--purple),var(--blue));
  color:#fff;
  font-family:var(--ft);
  font-size:13px;
  font-weight:850;
  cursor:pointer;
}
.feedback-cancel,.feedback-close-btn{
  min-height:42px;
  border-radius:12px;
  border:1px solid rgba(255,255,255,.10);
  background:rgba(255,255,255,.045);
  color:#e5e7eb;
  font-family:var(--ft);
  font-size:13px;
  font-weight:850;

function meta(k){return META[k]||{label:k,color:'#9ca3af',p:'+',s:'%'}}
function fmt(v){const n=Number(v)||0;const sign=n<0?-1:1;const abs=Math.abs(n);const whole=Math.floor(abs);const frac=abs-whole;if(frac<0.09)return sign*whole;const rounded=Math.round(abs*100)/100;return sign*(rounded%1===0?rounded:parseFloat(rounded.toFixed(2)))}
function clamp(v){return Math.min(15,Math.max(1,parseInt(v)||1))}
function scaledStats(item,lv,type){const stats=item.stats||{};let m=1;if(type==='accessories')m=1+Math.pow((lv-1)/20,1.1);else if(type==='relics')m=1+Math.pow((lv-1)/30,1.1);const out={};for(const [k,v] of Object.entries(stats))out[k]=Math.round(v*m*10000)/10000;return out}
function weaponDmg(wpn,lv){const base=wpn.stats.damage||0;const avg=15;return Math.max(Math.floor(avg*base*Math.pow(1+(lv-1)*0.045,1.4)),Math.max(base,5))}
function statValue(item,lv,type,key){if(type==='weapons'){if(key==='damage')return (item.stats.damage||0)*10 + weaponDmg(item,lv)/10 + (item.hasUlt?8:0) + (item.hasTransform?8:0) + ((item.stats.ultGain||0)*4);return 0}return scaledStats(item,lv,type)[key]||0}

function itemMini(item,type,lv,keys){if(!item)return '<div class="lac"><div class="ns">No matching item</div></div>';const st=type==='weapons'?{}:scaledStats(item,lv,type);const title=type==='weapons'?(item.displayName||item.name):item.name;const sub=type==='accessories'?item.type:(type==='relics'?(item.affiliations||[]).join(', '):'weapon');const stats=type==='weapons'?'<span class="sp" style="color:'+meta('damage').color+';border-color:'+meta('damage').color+'55;background:'+meta('damage').color+'18"><span class="sp-dot" style="background:'+meta('damage').color+'"></span>DMG ×'+fmt(item.stats.damage||0)+'</span>':Object.entries(st).map(([k,v])=>pill(k,v,keys.includes(k))).join('');return '<div class="lac"><div class="lac-nm"><span>'+title+'</span><span class="ac-rar r-'+item.rarity+'" style="font-size:9px">'+item.rarity+'</span></div><div class="ac-mt" style="margin-bottom:6px"><span class="ac-tag">'+sub+'</span></div><div class="lac-st">'+(stats||'<span class="ns">No useful stat for this build</span>')+'</div></div>'}

function renderLoadouts(){const el=document.getElementById('pane-loadouts');el.innerHTML=loadoutControls();const l=LOADOUTS.find(x=>x.id===STATE.loadouts.filter)||LOADOUTS[0];const lv=STATE.loadouts.lv;const ac=meta(l.keys[0]).color;let outfit,head,waist,bestRelic;if(l.fixedItems){outfit=findByName(DATA.accessories,l.fixedItems.outfit);head=findByName(DATA.accessories,l.fixedItems.head);waist=findByName(DATA.accessories,l.fixedItems.waist);bestRelic=findByName(DATA.relics,l.fixedItems.relic)}else{outfit=pickTop(DATA.accessories,lv,'accessories',l.keys,1,'outfit')[0];head=pickTop(DATA.accessories,lv,'accessories',l.keys,1,'head')[0];waist=pickTop(DATA.accessories,lv,'accessories',l.keys,1,'waist')[0];bestRelic=pickTop(DATA.relics,lv,'relics',l.keys,1)[0]}const all=[outfit,head,waist,bestRelic].filter(Boolean);const totals={};all.forEach(item=>{const type=item.type?'accessories':'relics';for(const [k,v]of Object.entries(scaledStats(item,lv,type)))totals[k]=(totals[k]||0)+v});const note=l.note?'<div class="loadout-note">Note: If you use units that are not <span class="colored-name" style="color:'+meta('ultCooldown').color+'">Second Wind</span>, switch <span class="colored-name" style="color:'+meta('damage').color+'">Carrots Outfit (Worned)</span> to <span class="colored-name" style="color:'+meta('critDamage').color+'">Gohun II&#39;s Outfit</span>.</div>':'';const box=document.getElementById('loadout-box');box.innerHTML='<div class="lc"><div class="lc-hd"><div class="lc-ico" style="background:'+ac+'18;border:1px solid '+ac+'33">'+iconSvg(l.id)+'</div><div class="lc-tw"><div class="lc-ttl" style="color:'+ac+'">'+l.label+'</div><div class="lc-sub">'+l.desc+'</div></div><div class="loadout-max-note"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 8v5"/><path d="M12 16h.01"/></svg>You can use 14 relics at max</div></div><div class="lc-bd"><div class="sg"><div class="sw"><div class="sl-lbl">Accessory - Outfit</div>'+itemMini(outfit,'accessories',lv,l.keys)+'</div><div class="sw"><div class="sl-lbl">Accessory - Head</div>'+itemMini(head,'accessories',lv,l.keys)+'</div><div class="sw"><div class="sl-lbl">Accessory - Waist</div>'+itemMini(waist,'accessories',lv,l.keys)+'</div><div class="sw"><div class="sl-lbl">Best Relic</div>'+itemMini(bestRelic,'relics',lv,l.keys)+'</div></div>'+note+'<div class="ts"><div class="ts-ttl">Combined stats</div><div class="tp">'+Object.entries(totals).sort((a,b)=>(l.keys.indexOf(a[0])<0?99:l.keys.indexOf(a[0]))-(l.keys.indexOf(b[0])<0?99:l.keys.indexOf(b[0]))).map(([k,v])=>{const m=meta(k),hi=l.keys.includes(k);return '<span class="tpp" style="color:'+m.color+';border-color:'+m.color+(hi?'55':'22')+';background:'+m.color+(hi?'18':'0a')+'"><span class="tpp-dot" style="background:'+m.color+'"></span>'+m.label+' '+m.p+fmt(v)+m.s+'</span>'}).join('')+'</div></div></div></div>'}

  document.querySelectorAll('[data-filter]').forEach(box=>box.onclick=e=>{const b=e.target.closest('.flt-btn,.sub-btn');if(!b)return;STATE[box.dataset.filter].filter=b.dataset.v;renderAll()})}

  function abbreviate(value){
    if(value >= 1000000) return (value / 1000000).toFixed(value >= 10000000 ? 1 : 2).replace(/\.0+$|0+$/,'') + 'M';
    if(value >= 1000) return (value / 1000).toFixed(value >= 100000 ? 1 : 2).replace(/\.0+$|0+$/,'') + 'K';
    return String(Math.round(value));
  }

  function warriorDamage(base, level){
    const baseReference = 600;
    if(level <= damageCurve[0][0]) return Math.round(base);
    for(let i = 0; i < damageCurve.length - 1; i++){
      const a = damageCurve[i];
      const b = damageCurve[i + 1];
      if(level >= a[0] && level <= b[0]){
        const t = (level - a[0]) / (b[0] - a[0]);
        const logA = Math.log(a[1] / baseReference);
        const logB = Math.log(b[1] / baseReference);
        return Math.round(base * Math.exp(logA + (logB - logA) * t));
      }
    }
    const last = damageCurve[damageCurve.length - 1];
    return Math.round(base * (last[1] / baseReference));
  }

    const q = normalizeText(STATE.drops.search);
    const items = Object.keys(data).map(name => {
      const meta = getDropMeta(name, group);
      const style = rarityStyle[meta.rarity] || rarityStyle.unknown;
      return {name, sources:data[name], meta, style};
    }).filter(item => !q || normalizeText(item.name + ' ' + item.meta.name + ' ' + item.meta.type + ' ' + (item.meta.slot||'') + ' ' + item.sources.join(' ')).includes(q)).sort((a,b) => {
      if(a.style.order !== b.style.order) return b.style.order - a.style.order;
      return a.name.localeCompare(b.name);
    });

    const byRarity = {};
    items.forEach(item => {
      const key = item.meta.rarity || 'unknown';
      if(!byRarity[key]) byRarity[key] = [];
      byRarity[key].push(item);
    });

    const rarityKeys = Object.keys(byRarity).sort((a,b) => (rarityStyle[b]?.order || 99) - (rarityStyle[a]?.order || 99));

    list.innerHTML = rarityKeys.map(rarity => {
      const style = rarityStyle[rarity] || rarityStyle.unknown;
      return `
        <div class="drop-rarity-title" style="color:${style.color}">
          <span>${style.label}</span>
        </div>
        <div class="extra-grid">
          ${byRarity[rarity].map((item,index) => `
            <div class="drop-card" style="--drop-color:${item.style.color};animation-delay:${Math.min(index * 0.035, .22)}s">
              <div class="drop-name">${item.meta.name || item.name}</div>
              <div class="drop-meta">
                <span class="drop-pill">${item.meta.type}</span>
                ${item.meta.slot ? `<span class="drop-pill">${item.meta.slot}</span>` : ''}
                <span class="drop-pill" style="color:${item.style.color};border-color:${item.style.color}66">${item.style.label}</span>
              </div>
              <div class="drop-sources">
                ${item.sources.map(source => `<div class="drop-line">${source}</div>`).join('')}
              </div>
            </div>
          `).join('')}
        </div>
      `;
    }).join('');
  }

  function renderDrops(){
    const pane = document.getElementById('pane-drops');
    if(!pane) return;
    pane.innerHTML = `
      <div class="extra-tabs-wrap">
        <div class="controls-row only-search"><div class="search-wrap"><input class="search-input" id="drops-search" type="search" placeholder="Search drops..." autocomplete="off" value="${STATE.drops.search || ''}"></div></div>
        <div class="mini-tabs tabs-under-search" id="drops-tabs">
          <button class="mini-tab ${STATE.drops.group === 'weapons' ? 'on' : ''}" data-group="weapons">Weapons</button>
          <button class="mini-tab ${STATE.drops.group === 'accessories' ? 'on' : ''}" data-group="accessories">Accessories</button>
          <button class="mini-tab ${STATE.drops.group === 'relics' ? 'on' : ''}" data-group="relics">Relics</button>
        </div>
        <div id="drops-list" class="extra-list"></div>
      </div>
    `;
    document.getElementById('drops-tabs').addEventListener('click', e => {
      const btn = e.target.closest('.mini-tab');
      if(!btn) return;
      document.querySelectorAll('#drops-tabs .mini-tab').forEach(x => x.classList.toggle('on', x === btn));
      renderDropGroup(btn.dataset.group);
    });
    document.getElementById('drops-search').addEventListener('input', e => { STATE.drops.search = e.target.value; renderDropGroup(STATE.drops.group || 'weapons'); });
    renderDropGroup(STATE.drops.group || 'weapons');
  }
  renderSuperWarriors();
  renderGauntletModifiers();
  renderDrops();
})();
</script>
<script>
(function(){
  document.addEventListener("keydown", function(event){
    if(event.key !== "Escape") return;
    document.querySelectorAll(".update-layer.open,.feedback-layer.open").forEach(function(layer){ layer.classList.remove("open"); });
  });
})();
</script>
<script>
(function(){
  function keepNavStart(){
    var nav = document.getElementById('main-nav');
    if(nav) nav.scrollLeft = 0;
  }
  window.addEventListener('load', keepNavStart);
  window.addEventListener('resize', keepNavStart);
})();
</script>
</body>
