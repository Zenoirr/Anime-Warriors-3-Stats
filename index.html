<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Warriors 3 Database</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#070912;
  --surface:#111622;
  --border:rgba(255,255,255,.10);
  --text:#f8fafc;
  --muted:#a9b4c7;
  --purple:#8b5cf6;
  --blue:#38bdf8;
  --gold:#facc15;
  --red:#f87171;
  --green:#34d399;
  --ft:'Outfit',sans-serif;
  --rar-common:#9ca3af;
  --rar-rare:#60a5fa;
  --rar-epic:#c084fc;
  --rar-legendary:#facc15;
  --rar-mythical:#f87171;
  --rar-exclusive:#f0abfc;
}
*{box-sizing:border-box}
html,body{min-height:100%;margin:0;overflow-x:hidden}
body{font-family:var(--ft);color:var(--text);background:#070912}
body::before{
  content:"";position:fixed;inset:0;z-index:-3;pointer-events:none;
  background:
    radial-gradient(circle at 14% 16%,rgba(139,92,246,.24),transparent 30%),
    radial-gradient(circle at 82% 14%,rgba(56,189,248,.17),transparent 31%),
    radial-gradient(circle at 50% 92%,rgba(99,102,241,.11),transparent 34%),
    linear-gradient(180deg,#070912,#0a0d18 48%,#06070d);
}
body::after{
  content:"";position:fixed;inset:-20%;z-index:-2;pointer-events:none;opacity:.34;
  background:
    linear-gradient(90deg,rgba(255,255,255,.04) 1px,transparent 1px),
    linear-gradient(rgba(255,255,255,.04) 1px,transparent 1px),
    radial-gradient(circle,rgba(139,92,246,.20) 0 1px,transparent 2px);
  background-size:64px 64px,64px 64px,140px 140px;
  
}
.bg-orb-one,.bg-orb-two{
  position:fixed;width:360px;height:360px;border-radius:50%;pointer-events:none;z-index:-1;filter:blur(34px);opacity:.10;
}
.bg-orb-one{left:7%;top:38%;background:var(--purple);}
.bg-orb-two{right:8%;bottom:12%;background:var(--blue);}
#root{min-height:100vh;padding-bottom:44px}

.hd{
  min-height:104px;padding:14px 16px 12px;gap:6px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;
  border-bottom:1px solid rgba(255,255,255,.08);
  background:
    radial-gradient(circle at 45% 10%,rgba(139,92,246,.22),transparent 34%),
    radial-gradient(circle at 62% 18%,rgba(56,189,248,.14),transparent 32%),
    linear-gradient(180deg,rgba(139,92,246,.055),transparent 72%);
}
.hd h1{
  margin:0;font-size:clamp(26px,3.1vw,42px);line-height:.98;font-weight:900;letter-spacing:-.04em;
  background:linear-gradient(135deg,#fff 20%,#c4b5fd 55%,#7dd3fc 100%);
  -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;
}
.hd p{max-width:720px;margin:0;color:#c0c8d8;font-size:12px;line-height:1.25}
.feedback-top{display:flex;flex-wrap:wrap;justify-content:center;gap:8px;margin-top:4px}
.feedback-button,.update-button{
  min-height:34px;padding:7px 13px;border-radius:10px;
  border:1px solid transparent;font-family:var(--ft);font-size:12px;font-weight:700;
  cursor:pointer;transition:.18s ease;display:inline-flex;align-items:center;justify-content:center;gap:8px;
}
.feedback-button{
  --btn-a:#8b5cf6;--btn-b:#38bdf8;
  border-color:rgba(139,92,246,.46);
  background:radial-gradient(circle at 0% 0%,rgba(139,92,246,.22),transparent 48%),rgba(255,255,255,.045);
  color:#fff;box-shadow:0 10px 28px rgba(0,0,0,.24),0 0 18px rgba(139,92,246,.12);
}
.update-button{
  --btn-a:#facc15;--btn-b:#fb923c;
  border-color:rgba(250,204,21,.46);
  background:radial-gradient(circle at 0% 0%,rgba(250,204,21,.22),transparent 48%),rgba(255,255,255,.045);
  color:#fff;box-shadow:0 10px 28px rgba(0,0,0,.24),0 0 18px rgba(250,204,21,.10);
}
.feedback-button:hover{border-color:rgba(56,189,248,.68);background:linear-gradient(135deg,rgba(139,92,246,.34),rgba(56,189,248,.24))}
.update-button:hover{border-color:rgba(251,146,60,.68);background:linear-gradient(135deg,rgba(250,204,21,.34),rgba(251,146,60,.24))}

.nav{
  position:sticky;top:0;z-index:40;display:flex;justify-content:center;gap:6px;
  padding:8px 14px;border-bottom:1px solid rgba(139,92,246,.16);
  background:rgba(7,9,18,.82);backdrop-filter:blur(16px);
  overflow-x:auto;overflow-y:hidden;scrollbar-width:none;
}
.nav::-webkit-scrollbar{display:none}
.nav-tab{
  flex:0 0 auto;padding:7px 13px;border-radius:10px;border:1px solid transparent;
  background:transparent;color:#aeb8c8;font-family:var(--ft);font-size:13px;font-weight:700;
  cursor:pointer;transition:.18s ease;display:inline-flex;align-items:center;justify-content:center;gap:6px;
}
.nav-tab:hover{color:#fff;background:rgba(139,92,246,.10)}
.nav-tab.on{color:#fff;background:linear-gradient(135deg,var(--purple),var(--blue));box-shadow:0 8px 24px rgba(139,92,246,.22)}
.nav-tab[data-tab="relics"].on{background:linear-gradient(135deg,#a78bfa,#facc15)!important}
.nav-tab[data-tab="weapons"].on{background:linear-gradient(135deg,#f87171,#fb923c)!important}
.nav-tab[data-tab="accessories"].on{background:linear-gradient(135deg,#38bdf8,#a78bfa)!important}
.nav-tab[data-tab="loadouts"].on{background:linear-gradient(135deg,#8b5cf6,#38bdf8)!important}
.nav-tab[data-tab="s-warriors"].on{background:linear-gradient(135deg,#22c55e,#38bdf8)!important}
.nav-tab[data-tab="g-modifiers"].on{background:linear-gradient(135deg,#f87171,#c084fc)!important}
.nav-tab[data-tab="drops"].on{background:linear-gradient(135deg,#34d399,#facc15)!important}
.nav-tab-disabled{opacity:.45;cursor:not-allowed;position:relative}
.nav-tab-disabled:hover{transform:none;color:#aeb8c8;background:transparent}
.nav-tab-disabled::after{
  content:"Coming soon";position:absolute;left:50%;bottom:-32px;transform:translateX(-50%) translateY(4px);
  opacity:0;pointer-events:none;white-space:nowrap;padding:6px 9px;border-radius:8px;
  background:rgba(10,13,20,.96);border:1px solid rgba(255,255,255,.14);color:#facc15;
  font-size:11px;font-weight:700;transition:.16s ease;
}
.nav-tab-disabled:hover::after{opacity:1;transform:translateX(-50%) translateY(0)}

.pane{display:none;width:100%;margin:0;padding:14px clamp(18px,3vw,56px) 58px}
.pane.on{display:block}

.card-base{
  border:1px solid rgba(255,255,255,.10);
  background:linear-gradient(180deg,rgba(255,255,255,.04),rgba(255,255,255,.018)),rgba(17,22,34,.94);
  border-radius:16px;box-shadow:0 14px 36px rgba(0,0,0,.24);
  transition:border-color .18s ease;
}
.card-base:hover{border-color:rgba(139,92,246,.28)}

.lg{display:none;padding:14px;margin-bottom:14px}
.lg-ttl,.lv-lbl,.sl-lbl,.ts-ttl{font-size:11px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:#b7c2d6}
.lg-grid{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px}
.lg-item{display:flex;align-items:center;gap:5px;font-size:12px;color:#cbd5e1}
.lg-dot,.dot,.sd,.sp-dot,.tpp-dot{flex:0 0 auto;display:inline-block;width:7px;height:7px;border-radius:999px;vertical-align:middle}
.sd,.sp-dot,.tpp-dot{margin-right:3px}

.lv-bar{
  display:grid;grid-template-columns:auto 1fr 70px auto;align-items:center;gap:12px;
  padding:13px;margin-bottom:14px;
}
.lv-sl{width:100%;accent-color:var(--purple)}
.lv-inp{
  width:70px;min-height:34px;border:1px solid rgba(255,255,255,.11);border-radius:10px;
  background:rgba(255,255,255,.05);color:#fff;text-align:center;font-family:var(--ft);font-size:15px;font-weight:800;
}
.lv-note{color:#96a2b8;font-size:11px;white-space:nowrap}

.search-wrap{margin:0 auto 14px;max-width:620px}
.search-input{
  width:100%;min-height:42px;border-radius:12px;border:1px solid rgba(255,255,255,.12);
  background:rgba(255,255,255,.055);color:#fff;font-family:var(--ft);font-size:14px;font-weight:600;
  outline:none;padding:0 14px;
}
.search-input::placeholder{color:#8f9bb0}
.search-input:focus{border-color:rgba(139,92,246,.55);box-shadow:0 0 0 4px rgba(139,92,246,.12)}
#pane-relics .search-input,#pane-relics .lv-bar{border-color:rgba(167,139,250,.24)!important}
#pane-weapons .search-input,#pane-weapons .lv-bar{border-color:rgba(248,113,113,.24)!important}
#pane-accessories .search-input,#pane-accessories .lv-bar{border-color:rgba(56,189,248,.24)!important}

.controls-row{
  display:grid;grid-template-columns:minmax(0,1fr) minmax(240px,360px);gap:12px;
  align-items:stretch;margin-bottom:14px;
}
.controls-row .lv-bar{margin-bottom:0}
.controls-row .search-wrap{margin:0;max-width:none}
.controls-row .search-input{height:100%;min-height:60px}
.controls-row.only-level{grid-template-columns:minmax(320px,820px);justify-content:center}
.controls-row.only-search{grid-template-columns:minmax(260px,620px);justify-content:center;margin-bottom:10px}

.flt,.subnav,.mini-tabs{display:flex;flex-wrap:wrap;justify-content:center;gap:9px;margin:14px 0}
.flt-btn,.sub-btn,.mini-tab{
  padding:7px 13px;border-radius:999px;border:1px solid rgba(255,255,255,.10);
  background:rgba(255,255,255,.055);color:#a8b2c3;font-family:var(--ft);font-size:13px;font-weight:700;
  cursor:pointer;transition:.18s ease;
}
.flt-btn.on,.sub-btn.on,.mini-tab.on{background:linear-gradient(135deg,var(--purple),var(--blue));border-color:rgba(255,255,255,.14);color:#fff}
.sub-btn svg{width:16px;height:16px;vertical-align:-3px;margin-right:6px;stroke:currentColor}
.tabs-under-search{justify-content:center;margin-top:0}

.tb{
  --tier-color:#8b5cf6;position:relative;overflow:hidden;padding:14px;margin-bottom:16px;
  border-color:color-mix(in srgb,var(--tier-color) 34%,transparent)!important;
  background:
    radial-gradient(circle at 0% 0%,color-mix(in srgb,var(--tier-color) 13%,transparent),transparent 38%),
    linear-gradient(180deg,rgba(255,255,255,.04),rgba(255,255,255,.018)),rgba(17,22,34,.94)!important;
}
.tb::before{content:"";position:absolute;inset:0 0 auto 0;height:3px;background:var(--tier-color);opacity:.75}
.tb.t-SS{--tier-color:#f87171}
.tb.t-SP{--tier-color:#fb923c}
.tb.t-S{--tier-color:#facc15}
.tb.t-A{--tier-color:#a78bfa}
.tb.t-B{--tier-color:#38bdf8}
.tb.t-C{--tier-color:#94a3b8}
.tb-hd{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.tb-badge{
  padding:6px 10px;border-radius:999px;font-size:12px;font-weight:800;
  color:var(--tier-color)!important;
  border:1px solid color-mix(in srgb,var(--tier-color) 48%,transparent);
  background:color-mix(in srgb,var(--tier-color) 10%,transparent);
}
.tb-desc{color:#cbd5e1;font-size:13px}
.tb-line{flex:1;height:1px;background:rgba(255,255,255,.08)}
.tb .cg{grid-template-columns:repeat(auto-fill,minmax(250px,330px))!important;justify-content:start!important}

.cg,.extra-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:12px}

.ac,.drop-card,.modifier-card,.extra-card{
  position:relative;overflow:hidden;padding:14px;min-height:auto;
  --card-color:#8b5cf6;
  border-color:color-mix(in srgb,var(--card-color) 24%,rgba(255,255,255,.08))!important;
  background:
    radial-gradient(circle at 0% 0%,color-mix(in srgb,var(--card-color) 9%,transparent),transparent 38%),
    linear-gradient(180deg,rgba(255,255,255,.045),rgba(255,255,255,.018)),rgba(17,22,34,.96)!important;
  transition:border-color .18s ease;
}
.ac::before,.drop-card::before,.modifier-card::before,.extra-card::before{
  content:"";position:absolute;inset:0 0 auto 0;height:3px;background:var(--card-color);opacity:.85;
}
.ac:hover,.drop-card:hover,.modifier-card:hover,.extra-card:hover{
  transform:translateY(-2px);
  border-color:color-mix(in srgb,var(--card-color) 42%,transparent)!important;
  box-shadow:0 12px 28px rgba(0,0,0,.24)!important;
}
.ac:has(.r-common){--card-color:var(--rar-common)}
.ac:has(.r-rare){--card-color:var(--rar-rare)}
.ac:has(.r-epic){--card-color:var(--rar-epic)}
.ac:has(.r-legendary){--card-color:var(--rar-legendary)}
.ac:has(.r-mythical){--card-color:var(--rar-mythical)}
.ac:has(.r-exclusive){--card-color:var(--rar-exclusive)}

.ac-nm,.extra-title,.drop-name,.modifier-title{color:#fff;font-size:17px;font-weight:800;letter-spacing:-.02em;margin-bottom:6px}
.ac-mt,.drop-meta,.modifier-lines{display:flex;align-items:center;flex-wrap:wrap;gap:6px;margin-bottom:8px}
.ac-rar,.ac-tag,.ac-aff,.ac-tp,.drop-pill,.modifier-pill{
  display:inline-flex;align-items:center;gap:5px;padding:4px 7px;border-radius:8px;
  border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.045);
  color:#cbd5e1;font-size:10px;font-weight:800;text-transform:uppercase;
}
.r-common{color:var(--rar-common)!important;border-color:rgba(156,163,175,.42)!important;background:rgba(156,163,175,.08)!important}
.r-rare{color:var(--rar-rare)!important;border-color:rgba(96,165,250,.42)!important;background:rgba(96,165,250,.08)!important}
.r-epic{color:var(--rar-epic)!important;border-color:rgba(192,132,252,.42)!important;background:rgba(192,132,252,.08)!important}
.r-legendary{color:var(--rar-legendary)!important;border-color:rgba(250,204,21,.45)!important;background:rgba(250,204,21,.10)!important}
.r-mythical{color:var(--rar-mythical)!important;border-color:rgba(248,113,113,.45)!important;background:rgba(248,113,113,.10)!important}
.r-exclusive{color:var(--rar-exclusive)!important;border-color:rgba(240,171,252,.45)!important;background:rgba(240,171,252,.10)!important}

.ac-dsc,.extra-sub,.modifier-desc,.drop-line,.extra-row-line{color:#aeb9cb;font-size:13px;line-height:1.5}
.sl{display:flex;flex-direction:column;gap:6px;margin-top:8px}
.sr,.extra-stat{
  display:flex;justify-content:space-between;gap:10px;padding-top:6px;
  border-top:1px solid rgba(255,255,255,.07);font-size:13px;
}
.sn{color:#b8c3d6;display:flex;align-items:center;gap:0;min-width:0}
.sv,.extra-stat span:last-child{font-variant-numeric:tabular-nums;font-weight:800}
.ns{color:#94a3b8;font-size:13px}

.ult-box,.tf-box,.sp-box{display:none}
.ac:hover .ult-box,.ac:focus-within .ult-box,
.ac:hover .tf-box,.ac:focus-within .tf-box,
.ac:hover .sp-box,.ac:focus-within .sp-box{display:block}
.ac:has(.ult-box),.ac:has(.tf-box),.ac:has(.sp-box){position:relative}
.ac:has(.ult-box)::after,.ac:has(.tf-box)::after,.ac:has(.sp-box)::after{
  content:"Hover for ultimate";display:inline-flex;margin-top:8px;padding:5px 8px;border-radius:999px;
  border:1px solid rgba(139,92,246,.35);background:rgba(139,92,246,.10);color:#c4b5fd;
  font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.05em;
}
.ac:hover::after,.ac:focus-within::after{display:none}

.ult-box,.tf-box,.sp-item,.weapon-note,.drop-line{
  margin-top:8px;padding:9px;border-radius:10px;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.035);
}
.ult-ttl,.tf-ttl{font-weight:800;color:#c4b5fd;margin-bottom:4px}
.ult-nm{color:#fff;font-weight:800}
.ult-dsc,.ult-xtra,.weapon-note{color:#b8c3d6;font-size:12px;line-height:1.45}
.ult-cd{font-variant-numeric:tabular-nums;font-weight:800}

.drop-card{--card-color:var(--drop-color,#34d399)}
.drop-card:hover{box-shadow:0 18px 42px rgba(0,0,0,.30),0 0 18px color-mix(in srgb,var(--card-color) 10%,transparent)!important}
.drop-line{border-color:rgba(255,255,255,.07)!important;background:rgba(255,255,255,.03)!important}
.drop-sources{display:flex;flex-direction:column;gap:6px}
.drop-rarity-title{display:flex;align-items:center;gap:10px;margin:16px 0 8px}
.drop-rarity-title span{font-size:14px;font-weight:800;letter-spacing:.08em;text-transform:uppercase}
.drop-rarity-title::after{content:"";flex:1;height:1px;background:rgba(255,255,255,.09)}

.modifier-card{
  min-height:145px;--card-color:var(--mod-color,#c084fc);
  background:
    radial-gradient(circle at 0% 0%,var(--mod-glow,rgba(192,132,252,.13)),transparent 40%),
    linear-gradient(180deg,rgba(255,255,255,.045),rgba(255,255,255,.018)),rgba(17,22,34,.96)!important;
}
.modifier-card::before{background:var(--mod-color,#c084fc)!important}
.modifier-pill{color:var(--mod-color,#c084fc)!important;border-color:var(--mod-border,rgba(192,132,252,.34))!important;background:var(--mod-soft,rgba(192,132,252,.10))!important}

.load-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px}
.lc{
  overflow:hidden;position:relative;
  --load-main:#8b5cf6;--load-alt:#38bdf8;
  border-color:color-mix(in srgb,var(--load-main) 28%,rgba(255,255,255,.08))!important;
  background:
    radial-gradient(circle at 0% 0%,color-mix(in srgb,var(--load-main) 10%,transparent),transparent 42%),
    radial-gradient(circle at 100% 0%,color-mix(in srgb,var(--load-alt) 6%,transparent),transparent 38%),
    linear-gradient(180deg,rgba(255,255,255,.034),rgba(255,255,255,.014)),rgba(17,22,34,.96)!important;
  box-shadow:0 14px 34px rgba(0,0,0,.24),0 0 16px color-mix(in srgb,var(--load-main) 5%,transparent)!important;
  transition:transform .18s ease,box-shadow .18s ease;
}
.lc-hd{
  display:flex;align-items:center;gap:12px;padding:14px;border-bottom:1px solid rgba(255,255,255,.08);
  background:linear-gradient(90deg,color-mix(in srgb,var(--load-main) 9%,transparent),color-mix(in srgb,var(--load-alt) 4%,transparent))!important;
}
.lc-ico{
  width:38px;height:38px;border-radius:12px;display:flex;align-items:center;justify-content:center;
  font-size:19px;flex:0 0 auto;
  color:var(--load-main)!important;
  background:color-mix(in srgb,var(--load-main) 12%,transparent)!important;
  border:1px solid color-mix(in srgb,var(--load-main) 34%,transparent)!important;
}
.lc-ico svg{width:21px;height:21px;display:block}
.lc-tw{min-width:0}
.lc-ttl{color:var(--load-main)!important;font-weight:800}
.lc-sub{color:#94a3b8;font-size:12px;margin-top:4px}
.lc-hd .loadout-max-note{
  margin-left:auto;display:inline-flex;align-items:center;gap:6px;
  color:#b8c3d6;font-size:12px;white-space:nowrap;
}
.lc-hd .loadout-max-note svg{width:15px;height:15px;color:#a78bfa}
.lc-bd{padding:16px 18px 18px}
.sg{display:grid;grid-template-columns:repeat(4,minmax(220px,1fr));gap:14px}
.sw{min-width:0}
.sl-lbl{
  color:#e5e7eb;background:rgba(255,255,255,.035);font-size:11px;font-weight:700;
  letter-spacing:.14em;text-transform:uppercase;margin-bottom:8px;
  padding:6px 8px;border-radius:9px;display:inline-flex;width:max-content;max-width:100%;
  border:1px solid rgba(255,255,255,.08);
}
.lac{
  padding:11px;border-radius:14px;background:linear-gradient(180deg,rgba(255,255,255,.035),rgba(255,255,255,.018)),rgba(17,22,34,.96);
  border:1px solid rgba(255,255,255,.10);box-shadow:none;
  position:relative;overflow:hidden;transition:border-color .18s ease;
}
.lac::before{display:none}
.lac:hover{border-color:color-mix(in srgb,var(--load-main) 24%,transparent)!important}
.lac-nm{display:flex;align-items:center;justify-content:space-between;gap:8px;color:#fff;font-size:15px;font-weight:800;margin-bottom:7px}
.lac-nm span:first-child{min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.lac-st,.tp{display:flex;flex-wrap:wrap;gap:6px}
.sp,.tpp{
  display:inline-flex;align-items:center;gap:0;padding:5px 7px;border-radius:999px;
  border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.04);font-size:11px;font-weight:800;line-height:1.15;
}
.ts{margin-top:14px;padding-top:12px;border-top:1px solid rgba(255,255,255,.08)}
.ts-ttl{margin-bottom:8px}
.relic-note{margin-top:7px;color:#94a3b8;font-size:11px;font-weight:700}
.loadout-note{
  margin-top:12px;padding:10px 12px;border-radius:14px;font-size:12px;font-weight:700;line-height:1.45;color:#cbd5e1;
  background:color-mix(in srgb,var(--load-main) 8%,transparent)!important;
  border:1px solid color-mix(in srgb,var(--load-main) 26%,transparent)!important;
}
.colored-name{font-weight:900}

function meta(k){return META[k]||{label:k,color:'#9ca3af',p:'+',s:'%'}}
function fmt(v){const n=Number(v)||0;const sign=n<0?-1:1;const abs=Math.abs(n);const whole=Math.floor(abs);const frac=abs-whole;if(frac<0.09)return sign*whole;const rounded=Math.round(abs*100)/100;return sign*(rounded%1===0?rounded:parseFloat(rounded.toFixed(2)))}
function clamp(v){return Math.min(15,Math.max(1,parseInt(v)||1))}
function scaledStats(item,lv,type){const stats=item.stats||{};let m=1;if(type==='accessories')m=1+Math.pow((lv-1)/20,1.1);else if(type==='relics')m=1+Math.pow((lv-1)/30,1.1);const out={};for(const [k,v] of Object.entries(stats))out[k]=Math.round(v*m*10000)/10000;return out}
function weaponDmg(wpn,lv){const base=wpn.stats.damage||0;const avg=15;return Math.max(Math.floor(avg*base*Math.pow(1+(lv-1)*0.045,1.4)),Math.max(base,5))}
function statValue(item,lv,type,key){if(type==='weapons'){if(key==='damage')return (item.stats.damage||0)*10+weaponDmg(item,lv)/10+(item.hasUlt?8:0)+(item.hasTransform?8:0)+((item.stats.ultGain||0)*4);return 0}return scaledStats(item,lv,type)[key]||0}
function buildValue(item,lv,type,keys){let total=0;const weights=[1000,100,10,1,.5];keys.forEach((k,i)=>total+=statValue(item,lv,type,k)*(weights[i]||1));if(type==='weapons'&&item.specials)total*=1.04;return total}
function itemValue(item,lv,type){const archetypes=[['damage','critDamage','drops','luck'],['critChance','critDamage','damage'],['drops','luck','damage'],['luck','drops','damage'],['xpGain','luck','drops'],['cash','drops','luck'],['defense','health','dodgeChance']];return Math.max(...archetypes.map(keys=>buildValue(item,lv,type,keys)))}
function tierByRank(idx,total){const p=(idx+1)/total;if(p<=.16)return'SS';if(p<=.32)return'SP';if(p<=.50)return'S';if(p<=.68)return'A';if(p<=.84)return'B';return'C'}
function statRows(stats){return Object.entries(stats).map(([k,v])=>{const m=meta(k);return '<div class="sr"><span class="sn"><span class="sd" style="background:'+m.color+'"></span>'+m.label+'</span><span class="sv" style="color:'+m.color+'">'+m.p+fmt(v)+m.s+'</span></div>'}).join('')}
function legend(){return '<div class="lg card-base"><div class="lg-ttl">Stat color key</div><div class="lg-grid">'+Object.entries(META).map(([,m])=>'<div class="lg-item"><span class="lg-dot" style="background:'+m.color+'"></span><span>'+m.label+'</span></div>').join('')+'</div></div>'}
function searchBox(type,placeholder){const st=STATE[type]||{};return '<div class="search-wrap"><input class="search-input" data-search="'+type+'" type="search" placeholder="'+placeholder+'" autocomplete="off" value="'+(st.search||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;')+'"></div>'}
function controls(type,label,filters){const st=STATE[type];return legend()+'<div class="controls-row card-base"><div class="lv-bar"><span class="lv-lbl">'+label+' Level</span><input type="range" class="lv-sl" data-lv="'+type+'" min="1" max="15" step="1" value="'+st.lv+'"><input type="number" class="lv-inp" data-lvinp="'+type+'" min="1" max="15" value="'+st.lv+'"><span class="lv-note">Drag to adjust · max 15</span></div>'+searchBox(type,'Search '+type+'...')+'</div><div class="flt" data-filter="'+type+'">'+filters.map(f=>'<button class="flt-btn '+(st.filter===f.v?'on':'')+'" data-v="'+f.v+'">'+f.label+'</button>').join('')+'</div>'}
function normalizeText(v){return String(v||'').toLowerCase().replace(/[^a-z0-9%+.' -]/g,'')}
function normalizeName(v){return String(v).toLowerCase().replace(/[^a-z0-9]/g,'')}
function filterItems(items,type){const f=STATE[type].filter;let out=items;if(f!=='all'){if(type==='relics')out=out.filter(x=>(x.affiliations||[]).includes(f));else if(type==='accessories')out=out.filter(x=>x.type===f);else if(type==='weapons'){if(f==='has-ult')out=out.filter(x=>x.hasUlt);if(f==='no-ult')out=out.filter(x=>!x.hasUlt)}}const q=normalizeText(STATE[type].search);if(q)out=out.filter(x=>normalizeText(JSON.stringify(x)).includes(q));return out}
function manualTierFor(item,type){if(!MANUAL_TIERS[type])return null;return MANUAL_TIERS[type][item.name]||MANUAL_TIERS[type][item.displayName]||null}

function renderList(target,items,type){
  const lv=STATE[type].lv;const hasManual=!!MANUAL_TIERS[type];
  const scored=filterItems(items,type).map(x=>({...x,_value:itemValue(x,lv,type),_manualTier:manualTierFor(x,type)}))
    .sort((a,b)=>{if(hasManual){const ta=a._manualTier||tierByRank(999,1000);const tb=b._manualTier||tierByRank(999,1000);if((TIER_ORDER[ta]??99)!==(TIER_ORDER[tb]??99))return(TIER_ORDER[ta]??99)-(TIER_ORDER[tb]??99)}return b._value-a._value});
  const total=Math.max(1,scored.length);const grouped={};TIERS.forEach(t=>grouped[t.id]=[]);
  scored.forEach((x,i)=>{const tier=hasManual?(x._manualTier||tierByRank(i,total)):tierByRank(i,total);grouped[tier].push(x)});
  target.innerHTML+=TIERS.map(t=>{const arr=grouped[t.id];if(!arr.length)return'';return'<div class="tb card-base t-'+t.id+'"><div class="tb-hd"><div class="tb-badge">'+t.label+'</div><span class="tb-desc">'+t.desc+'</span><div class="tb-line"></div></div><div class="cg">'+arr.map(x=>card(x,type,lv)).join('')+'</div></div>'}).join('')
}

function card(item,type,lv){
  if(type==='weapons')return weaponCard(item,lv);
  const st=scaledStats(item,lv,type);
  const tags=type==='relics'?(item.affiliations||[]).map(a=>'<span class="ac-aff">'+a+'</span>').join(''):'<span class="ac-tp">'+item.type+'</span>';
  return '<div class="ac card-base"><div class="ac-nm">'+item.name+'</div><div class="ac-mt">'+tags+'<span class="ac-rar r-'+item.rarity+'">'+item.rarity+'</span></div>'+(item.description?'<div class="ac-dsc">'+item.description+'</div>':'')+'<div class="sl">'+(Object.keys(st).length?statRows(st):'<div class="ns">Cosmetic only / no stats</div>')+'</div></div>'
}

  "Thunder God Staff":["Pairing combo: equip with Thunder Drums to evolve the ultimate into Raigo.","Estimated LVL 15 damage: Thunder God Staff ~2.4M, Golden Hook Style ~2.2M.","Raigo changes: damage reduced from 220x to 200x, cooldown increased from 60s to 100s."],

  const tf=wpn.transform?'<div class="tf-box"><div class="tf-ttl">Transform</div>+'+wpn.transform.buffs.damage+'% DMG · +'+wpn.transform.buffs.attackSpeed+'% ATK SPD · '+wpn.transform.duration+'s</div>':'';

}

function renderRelics(){const el=document.getElementById('pane-relics');el.innerHTML=controls('relics','Relic',[{v:'all',label:'All'},{v:'physical',label:'Physical'},{v:'magic',label:'Magic'}]);renderList(el,DATA.relics,'relics')}
function renderWeapons(){const el=document.getElementById('pane-weapons');el.innerHTML=controls('weapons','Weapon',[{v:'all',label:'All'},{v:'has-ult',label:'Has Ultimate'},{v:'no-ult',label:'No Ultimate'}]);renderList(el,DATA.weapons,'weapons')}
function renderAccessories(){const el=document.getElementById('pane-accessories');el.innerHTML=controls('accessories','Item',[{v:'all',label:'All'},{v:'outfit',label:'Outfit'},{v:'head',label:'Head'},{v:'waist',label:'Waist'}]);renderList(el,DATA.accessories,'accessories')}

    drops:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 3h12l3 5-9 13L3 8z"/><path d="M3 8h18"/><path d="M8 8l4 13 4-13"/></svg>',
    luck:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 13a4 4 0 1 0-4-4c0 3 4 8 4 8s4-5 4-8a4 4 0 0 0-4-4z"/><path d="M12 17v4"/><path d="M9 21h6"/></svg>',

  };

function findByName(list,name){return list.find(item=>normalizeText(item.name)===normalizeText(name)||normalizeText(item.displayName||'')===normalizeText(name))}
function pickTop(items,lv,type,keys,count,slot){let pool=items;if(slot)pool=pool.filter(x=>x.type===slot);return pool.map(x=>({...x,_value:buildValue(x,lv,type,keys)})).filter(x=>x._value>0).sort((a,b)=>b._value-a._value).slice(0,count)}

function pill(k,v,hi){const m=meta(k);return '<span class="sp" style="color:'+m.color+';border-color:'+m.color+(hi?'55':'22')+';background:'+m.color+(hi?'1a':'0a')+'"><span class="sp-dot" style="background:'+m.color+'"></span>'+m.label+' '+m.p+fmt(v)+m.s+'</span>'}

function itemMini(item,type,lv,keys){
  if(!item)return '<div class="lac"><div class="ns">No matching item</div></div>';
  const st=type==='weapons'?{}:scaledStats(item,lv,type);
  const title=type==='weapons'?(item.displayName||item.name):item.name;
  const sub=type==='accessories'?item.type:(type==='relics'?(item.affiliations||[]).join(', '):'weapon');
  const stats=type==='weapons'?'<span class="sp" style="color:'+meta('damage').color+';border-color:'+meta('damage').color+'55;background:'+meta('damage').color+'18"><span class="sp-dot" style="background:'+meta('damage').color+'"></span>DMG ×'+fmt(item.stats.damage||0)+'</span>':Object.entries(st).map(([k,v])=>pill(k,v,keys.includes(k))).join('');
  return '<div class="lac"><div class="lac-nm"><span>'+title+'</span><span class="ac-rar r-'+item.rarity+'" style="font-size:9px">'+item.rarity+'</span></div><div class="ac-mt" style="margin-bottom:6px"><span class="ac-tag">'+sub+'</span></div><div class="lac-st">'+(stats||'<span class="ns">No useful stat for this build</span>')+'</div></div>'
}

function loadoutControls(){
  const st=STATE.loadouts;
  return legend()+'<div class="loadout-controls"><div class="lv-bar card-base"><span class="lv-lbl">Loadout Level</span><input type="range" class="lv-sl" data-lv="loadouts" min="1" max="15" step="1" value="'+st.lv+'"><input type="number" class="lv-inp" data-lvinp="loadouts" min="1" max="15" value="'+st.lv+'"><span class="lv-note">Accessories + best relic · max 14 relics</span></div></div><div class="subnav" data-filter="loadouts">'+LOADOUTS.map(l=>'<button class="sub-btn '+(st.filter===l.id?'on':'')+'" data-v="'+l.id+'">'+iconSvg(l.id)+l.label+'</button>').join('')+'</div><div id="loadout-box"></div>'
}

function renderLoadouts(){
  const el=document.getElementById('pane-loadouts');
  el.innerHTML=loadoutControls();
  const l=LOADOUTS.find(x=>x.id===STATE.loadouts.filter)||LOADOUTS[0];
  const lv=STATE.loadouts.lv;
  const ac=meta(l.keys[0]).color;
  let outfit,head,waist,bestRelic;
  if(l.fixedItems){
    outfit=findByName(DATA.accessories,l.fixedItems.outfit);
    head=findByName(DATA.accessories,l.fixedItems.head);
    waist=findByName(DATA.accessories,l.fixedItems.waist);
    bestRelic=findByName(DATA.relics,l.fixedItems.relic);
  }else{
    outfit=pickTop(DATA.accessories,lv,'accessories',l.keys,1,'outfit')[0];
    head=pickTop(DATA.accessories,lv,'accessories',l.keys,1,'head')[0];
    waist=pickTop(DATA.accessories,lv,'accessories',l.keys,1,'waist')[0];
    bestRelic=pickTop(DATA.relics,lv,'relics',l.keys,1)[0];
  }
  const all=[outfit,head,waist,bestRelic].filter(Boolean);
  const totals={};
  all.forEach(item=>{const type=item.type?'accessories':'relics';for(const [k,v] of Object.entries(scaledStats(item,lv,type)))totals[k]=(totals[k]||0)+v});
  const note=l.note?'<div class="loadout-note">Note: If you use units that are not <span class="colored-name" style="color:'+meta('ultCooldown').color+'">Second Wind</span>, switch <span class="colored-name" style="color:'+meta('damage').color+'">Carrots Outfit (Worned)</span> to <span class="colored-name" style="color:'+meta('critDamage').color+'">Gohun II\'s Outfit</span>.</div>':'';
  const loadTheme={dps:['#f87171','#fb923c'],drops:['#34d399','#c084fc'],luck:['#facc15','#34d399'],xpGain:['#6ee7b7','#38bdf8'],cash:['#86efac','#facc15']}[l.id]||['#8b5cf6','#38bdf8'];
  const box=document.getElementById('loadout-box');
  box.innerHTML='<div class="lc card-base" style="--load-main:'+loadTheme[0]+';--load-alt:'+loadTheme[1]+'"><div class="lc-hd"><div class="lc-ico">'+iconSvg(l.id)+'</div><div class="lc-tw"><div class="lc-ttl">'+l.label+'</div><div class="lc-sub">'+l.desc+'</div></div><div class="loadout-max-note"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 8v5"/><path d="M12 16h.01"/></svg>You can use 14 relics at max</div></div><div class="lc-bd"><div class="sg"><div class="sw"><div class="sl-lbl">Accessory — Outfit</div>'+itemMini(outfit,'accessories',lv,l.keys)+'</div><div class="sw"><div class="sl-lbl">Accessory — Head</div>'+itemMini(head,'accessories',lv,l.keys)+'</div><div class="sw"><div class="sl-lbl">Accessory — Waist</div>'+itemMini(waist,'accessories',lv,l.keys)+'</div><div class="sw"><div class="sl-lbl">Best Relic</div>'+itemMini(bestRelic,'relics',lv,l.keys)+'</div></div>'+note+'<div class="ts"><div class="ts-ttl">Combined stats</div><div class="tp">'+Object.entries(totals).sort((a,b)=>(l.keys.indexOf(a[0])<0?99:l.keys.indexOf(a[0]))-(l.keys.indexOf(b[0])<0?99:l.keys.indexOf(b[0]))).map(([k,v])=>{const m=meta(k),hi=l.keys.includes(k);return '<span class="tpp" style="color:'+m.color+';border-color:'+m.color+(hi?'55':'22')+';background:'+m.color+(hi?'18':'0a')+'"><span class="tpp-dot" style="background:'+m.color+'"></span>'+m.label+' '+m.p+fmt(v)+m.s+'</span>'}).join('')+'</div></div></div></div>'
}

function renderAll(){renderRelics();renderWeapons();renderAccessories();renderLoadouts();bindDynamic()}
function renderSection(key){
  if(key==='relics')renderRelics();
  else if(key==='weapons')renderWeapons();
  else if(key==='accessories')renderAccessories();
  else if(key==='loadouts')renderLoadouts();
  bindDynamic();
}

function bindDynamic(){
  document.querySelectorAll('[data-lv]').forEach(sl=>{
    sl.oninput=e=>{const key=e.target.dataset.lv;STATE[key].lv=parseInt(e.target.value);const inp=document.querySelector('[data-lvinp="'+key+'"]');if(inp)inp.value=STATE[key].lv};
    sl.onchange=e=>renderSection(e.target.dataset.lv);
    setTimeout(()=>animatePaneItems(document.querySelector('.pane.on')),50);
    sl.onpointerup=e=>renderSection(e.target.dataset.lv);
    sl.onkeyup=e=>{if(['ArrowLeft','ArrowRight','Home','End'].includes(e.key))renderSection(e.target.dataset.lv)};
  });
  document.querySelectorAll('[data-lvinp]').forEach(inp=>{
    inp.onblur=e=>{STATE[e.target.dataset.lvinp].lv=clamp(e.target.value);renderSection(e.target.dataset.lvinp)};
    inp.onkeydown=e=>{if(e.key==='Enter'){e.preventDefault();e.target.blur()}};
  });
  function applyLiveSearch(key){
    const pane=document.getElementById('pane-'+key);if(!pane)return;
    const q=normalizeText(STATE[key].search);
    pane.querySelectorAll('.ac').forEach(item=>{item.style.display=!q||normalizeText(item.textContent).includes(q)?'':'none'});
    pane.querySelectorAll('.tb').forEach(group=>{group.style.display=Array.from(group.querySelectorAll('.ac')).some(item=>item.style.display!=='none')?'':'none'});
  }
  document.querySelectorAll('[data-search]').forEach(inp=>{
    inp.oninput=e=>{const key=e.target.dataset.search;if(STATE[key])STATE[key].search=e.target.value;applyLiveSearch(key)};
  });

  document.querySelectorAll('[data-filter]').forEach(box=>box.onclick=e=>{
    const b=e.target.closest('.flt-btn,.sub-btn');
    if(!b)return;
    STATE[box.dataset.filter].filter=b.dataset.v;
    renderSection(box.dataset.filter);
  });
}

function animatePaneItems(pane){
  if(!pane)return;
}

document.getElementById('main-nav').addEventListener('click',e=>{
  const b=e.target.closest('.nav-tab');
  if(!b||b.classList.contains('nav-tab-disabled'))return;
  document.querySelectorAll('.nav-tab').forEach(x=>x.classList.toggle('on',x===b));
  document.querySelectorAll('.pane').forEach(x=>x.classList.remove('on'));
  const pane=document.getElementById('pane-'+b.dataset.tab);
  pane.classList.add('on');
  animatePaneItems(pane);
});

renderAll();
</script>

  var button=document.getElementById("feedbackButton");

(function(){
  var updateVersion="2.1";
  var versions={
    "2.1":[
      {title:"Loadout Visual Fixes",tag:"UI",details:["Softened the DPS loadout background color","Improved loadout label readability","Changed the DPS loadout icon"]},
      {title:"Drops Update",tag:"UI",details:["Improved the Drops tabs","Added raids filter"]},

    ],

      {title:"Search Bars Added",tag:"NEW",details:["Removed Stat Color Key","Added search bar to several sections for easier navigation"]},

      {title:"Weapon Tier Fix",tag:"BUG",details:["Has Ultimate and No Ultimate filters now follow the manual weapon tier order"]},
      {title:"Tier List Update",tag:"BALANCE",details:["Relics tier list adjusted","Accessories tier list adjusted","Missing accessories placed in B and C tiers by priority"]},
      {title:"Balance Changes",tag:"BALANCE",details:["Dawn Cloak dodge reduced from 10% to 5%","Fox Mask dodge reduced from 5% to 2.5%","Sky Wings dodge reduced from 7.5% to 2.5%","Desert Warlord Coat damage increased from 20% to 25%"]},
      {title:"Secret Warriors Updates",tag:"NEW",details:["Added full in-game special descriptions","Added Shiny toggle"]},
      {title:"Loadouts UI Changes",tag:"UI",details:["Removed DAMAGE and CRITICAL from DPS","Added SVG icons"]},
      {title:"UI Overhaul",tag:"UI",details:["The entire site received UX improvements","Added SVG icons throughout"]}
    ],
  };
  var button=document.getElementById("updateButton");
  var layer=document.getElementById("updateLayer");
  var close=document.getElementById("updateClose");
  var versionText=document.getElementById("updateVersionText");
  var list=document.getElementById("updateList");
  var tabs=document.getElementById("versionTabs");
  if(!button||!layer||!close||!versionText||!list||!tabs)return;
  var tagPriority={NEW:0,BALANCE:1,UI:2,BUG:3};
  function renderVersion(version){
    var notes=versions[version]||versions[updateVersion];
    versionText.textContent="Version "+version;
    tabs.innerHTML=Object.keys(versions).map(function(v){return'<button class="version-tab '+(v===version?'on':'')+'" type="button" data-version="'+v+'">v'+v+'</button>'}).join("");
    var sorted=notes.slice().sort(function(a,b){return(tagPriority[a.tag||"NEW"]??9)-(tagPriority[b.tag||"NEW"]??9)});
    list.innerHTML=sorted.map(function(note){
      var tag=note.tag||"NEW";
      var sub=note.details&&note.details.length?'<div class="update-sublist">'+note.details.map(function(d){return'<div class="update-subitem">— '+d+'</div>'}).join("")+'</div>':'';
      return'<div class="update-item"><span class="update-tag '+tag.toLowerCase()+'">'+tag+'</span><div>'+note.title+'</div>'+sub+'</div>';
    }).join("");
  }
  tabs.onclick=function(e){var btn=e.target.closest(".version-tab");if(!btn)return;renderVersion(btn.dataset.version)};
  function openLog(){renderVersion(updateVersion);layer.classList.add("open")}
  function closeLog(){layer.classList.remove("open");try{localStorage.setItem("w3UpdateSeen",updateVersion)}catch(e){}}
  button.onclick=openLog;
  close.onclick=closeLog;
  layer.onclick=function(e){if(e.target===layer)closeLog()};
  renderVersion(updateVersion);
})();
</script>

    const pane=document.getElementById('pane-drops');if(!pane)return;
    const sources=[['all','All Sources'],['red ribbon base','Red Ribbon Base'],['destroyed nemak','Destroyed Nemak'],['clan hideout','Clan Hideout'],['desert kingdom','Desert Kingdom'],['world','World / Gauntlet']];
    pane.innerHTML=`<div class="extra-tabs-wrap"><div class="controls-row only-search"><div class="search-wrap"><input class="search-input" id="drops-search" type="search" placeholder="Search drops..." autocomplete="off" value="${STATE.drops.search||''}"></div></div><div class="mini-tabs tabs-under-search" id="drops-tabs"><button class="mini-tab ${STATE.drops.group==='weapons'?'on':''}" data-group="weapons">Weapons</button><button class="mini-tab ${STATE.drops.group==='accessories'?'on':''}" data-group="accessories">Accessories</button><button class="mini-tab ${STATE.drops.group==='relics'?'on':''}" data-group="relics">Relics</button></div><div class="drop-source-tabs" id="drop-source-tabs">${sources.map(s=>`<button class="drop-source-tab ${STATE.drops.source===s[0]?'on':''}" data-source="${s[0]}">${s[1]}</button>`).join('')}</div><div id="drops-list" class="extra-list"></div></div>`;
    document.getElementById('drops-tabs').addEventListener('click',e=>{const btn=e.target.closest('.mini-tab');if(!btn)return;document.querySelectorAll('#drops-tabs .mini-tab').forEach(x=>x.classList.toggle('on',x===btn));renderDropGroup(btn.dataset.group)});
    document.getElementById('drop-source-tabs').addEventListener('click',e=>{const btn=e.target.closest('.drop-source-tab');if(!btn)return;STATE.drops.source=btn.dataset.source;document.querySelectorAll('#drop-source-tabs .drop-source-tab').forEach(x=>x.classList.toggle('on',x===btn));renderDropGroup(STATE.drops.group||'weapons')});
    document.getElementById('drops-search').addEventListener('input',e=>{STATE.drops.search=e.target.value;renderDropGroup(STATE.drops.group||'weapons')});
    renderDropGroup(STATE.drops.group||'weapons');
  }

  function renderModifierGroup(group){
    const list=document.getElementById('modifier-list');if(!list)return;
    if(group==='priorities'){STATE.gModifiers.group=group;renderModifierPriorities();return}
    const colors={damage:{color:'#f87171',border:'rgba(248,113,113,.34)',soft:'rgba(248,113,113,.11)',glow:'rgba(248,113,113,.16)'},drop:{color:'#34d399',border:'rgba(52,211,153,.34)',soft:'rgba(52,211,153,.11)',glow:'rgba(52,211,153,.15)'},luck:{color:'#c084fc',border:'rgba(192,132,252,.36)',soft:'rgba(192,132,252,.12)',glow:'rgba(192,132,252,.16)'}};
    const theme=colors[group]||colors.damage;
    STATE.gModifiers.group=group;
    const q=normalizeText(STATE.gModifiers.search);
    const cards=gauntletModifiers[group].filter(card=>!q||normalizeText(card.name+' '+card.lines.join(' ')+' '+(card.desc||'')).includes(q));
    list.innerHTML='<div class="extra-grid">'+cards.map((card,index)=>`<div class="modifier-card card-base" style="--mod-color:${theme.color};--mod-border:${theme.border};--mod-soft:${theme.soft};--mod-glow:${theme.glow};animation-delay:${Math.min(index*0.035,.22)}s"><div class="modifier-title">${card.name}</div><div class="modifier-lines">${card.lines.map(line=>`<span class="modifier-pill">${line}</span>`).join('')}</div>${card.desc?`<div class="modifier-desc">${card.desc}</div>`:''}</div>`).join('')+'</div>';
  }

  function renderGauntletModifiers(){
    const pane=document.getElementById('pane-g-modifiers');if(!pane)return;
    pane.innerHTML=`<div class="extra-tabs-wrap"><div class="controls-row only-search"><div class="search-wrap"><input class="search-input" id="modifier-search" type="search" placeholder="Search modifiers..." autocomplete="off" value="${STATE.gModifiers.search||''}"></div></div><div class="mini-tabs tabs-under-search" id="modifier-tabs"><button class="mini-tab ${STATE.gModifiers.group==='damage'?'on':''}" data-group="damage">Damage</button><button class="mini-tab ${STATE.gModifiers.group==='drop'?'on':''}" data-group="drop">Drop</button><button class="mini-tab ${STATE.gModifiers.group==='luck'?'on':''}" data-group="luck">Luck</button><button class="mini-tab ${STATE.gModifiers.group==='priorities'?'on':''}" data-group="priorities">Priorities</button></div><div id="modifier-list" class="extra-list"></div></div>`;
    document.getElementById('modifier-tabs').addEventListener('click',e=>{const btn=e.target.closest('.mini-tab');if(!btn)return;document.querySelectorAll('#modifier-tabs .mini-tab').forEach(x=>x.classList.toggle('on',x===btn));renderModifierGroup(btn.dataset.group)});
    document.getElementById('modifier-search').addEventListener('input',e=>{STATE.gModifiers.search=e.target.value;renderModifierGroup(STATE.gModifiers.group||'damage')});
    renderModifierGroup(STATE.gModifiers.group||'damage');
  }

  renderSuperWarriors();
  renderGauntletModifiers();
  renderDrops();
})();
</script>

<script>
(function(){
  document.addEventListener("keydown",function(e){if(e.key!=="Escape")return;document.querySelectorAll(".update-layer.open,.feedback-layer.open").forEach(function(l){l.classList.remove("open")})});
  var nav=document.getElementById('main-nav');
  function keepNavStart(){if(nav)nav.scrollLeft=0}
  window.addEventListener('load',keepNavStart);
  window.addEventListener('resize',keepNavStart);
})();
</script>
</body>
</html>
