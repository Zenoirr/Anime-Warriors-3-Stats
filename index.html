.feedback-top{
  display:flex;
  justify-content:center;
  margin-top:14px;
}
.feedback-button{
  font-family:var(--ft);
  font-size:14px;
  font-weight:700;
  letter-spacing:.08em;
  color:#fff;
  background:var(--sur);
  border:1px solid var(--bd2);
  border-radius:10px;
  padding:10px 18px;
  cursor:pointer;
}
.feedback-button:hover{
  border-color:rgba(167,139,250,.55);
  color:#c4b5fd;
}
.feedback-layer{
  position:fixed;
  inset:0;
  z-index:9999;
  display:none;
  align-items:center;
  justify-content:center;
  padding:18px;
  background:rgba(0,0,0,.72);
}
.feedback-layer.open{
  display:flex;
}
.feedback-panel{
  width:100%;
  max-width:430px;
  background:#111318;
  border:1px solid rgba(255,255,255,.12);
  border-radius:14px;
  padding:18px;
  box-shadow:0 20px 60px rgba(0,0,0,.5);
}
.feedback-panel h2{
  font-family:var(--ft);
  font-size:24px;
  letter-spacing:.08em;
  text-transform:uppercase;
  margin-bottom:12px;
}
.feedback-panel label{
  display:block;
  margin:10px 0 5px;
  font-family:var(--ft);
  font-size:12px;
  font-weight:700;
  letter-spacing:.1em;
  text-transform:uppercase;
  color:var(--mu);
}
.feedback-panel select,
.feedback-panel input,
.feedback-panel textarea{
  width:100%;
  background:#181b22;
  border:1px solid rgba(255,255,255,.12);
  border-radius:8px;
  color:#fff;
  padding:10px;
  font-family:var(--fb);
  font-size:14px;
  outline:none;
}
.feedback-panel textarea{
  min-height:120px;
  resize:vertical;
}
.feedback-row{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}
.feedback-actions{
  display:flex;
  gap:10px;
  margin-top:14px;
}
.feedback-actions button{
  flex:1;
  border-radius:8px;
  padding:10px;
  cursor:pointer;
  font-family:var(--ft);
  font-size:13px;
  font-weight:700;
  letter-spacing:.08em;
}
.feedback-send{
  background:#a78bfa;
  border:1px solid #a78bfa;
  color:#fff;
}
.feedback-cancel{
  background:#181b22;
  border:1px solid rgba(255,255,255,.12);
  color:#cbd5e1;
}
.feedback-message{
  min-height:16px;
  margin-top:10px;
  color:#9ca3af;
  font-size:12px;
}
@media(max-width:720px){
  .feedback-row{
    grid-template-columns:1fr;
  }
}
.update-button{font-family:var(--ft);font-size:14px;font-weight:700;letter-spacing:.08em;color:#fff;background:var(--sur);border:1px solid var(--bd2);border-radius:10px;padding:10px 18px;cursor:pointer}
.update-button:hover{border-color:rgba(250,204,21,.55);color:#facc15}
.feedback-top{gap:10px}

.update-layer.open{display:flex}
.update-panel{width:100%;max-width:460px;background:#111318;border:1px solid rgba(255,255,255,.12);border-radius:14px;padding:18px;box-shadow:0 20px 60px rgba(0,0,0,.5)}
.update-panel h2{font-family:var(--ft);font-size:24px;letter-spacing:.08em;text-transform:uppercase;margin-bottom:6px}

.extra-tabs-wrap{display:flex;flex-direction:column;gap:14px}

:root{
  --bg:#070910;
  --sur:#111620;
  --sur2:#171d29;
  --bd:rgba(255,255,255,.10);
  --bd2:rgba(255,255,255,.18);
  --tx:#f3f4f8;
  --mu:#9aa3b5;
}
body{
  background:
    radial-gradient(circle at 18% 8%,rgba(248,113,113,.12),transparent 24%),
    radial-gradient(circle at 82% 10%,rgba(167,139,250,.14),transparent 28%),
    radial-gradient(circle at 50% 110%,rgba(56,189,248,.10),transparent 30%),
    var(--bg);
}
body::before{
  opacity:.72;
  background-image:
    linear-gradient(rgba(255,255,255,.025) 1px,transparent 1px),

const STATE={relics:{lv:1,filter:'all'},weapons:{lv:1,filter:'all'},accessories:{lv:1,filter:'all'},loadouts:{lv:1,filter:'damage'}};
const TIERS=[{id:'SS',label:'SS',desc:'Best items for DMG / CRIT / DROP / LUCK'},{id:'SP',label:'S+',desc:'Second best items in each category'},{id:'S',label:'S',desc:'Third best items in each category'},{id:'A',label:'A',desc:'Strong alternatives'},{id:'B',label:'B',desc:'Situational choices'},{id:'C',label:'C',desc:'Weak or niche items'}];
const LOADOUTS=[

const META=DATA.statMeta;
function meta(k){return META[k]||{label:k,color:'#9ca3af',p:'+',s:'%'}}
function fmt(v){const r=Math.round(v*10000)/10000;return r%1===0?r:parseFloat(r.toFixed(4))}
function clamp(v){return Math.min(15,Math.max(1,parseInt(v)||1))}
function scaledStats(item,lv,type){const stats=item.stats||{};let m=1;if(type==='accessories')m=1+Math.pow((lv-1)/20,1.1);else if(type==='relics')m=1+Math.pow((lv-1)/30,1.1);const out={};for(const [k,v] of Object.entries(stats))out[k]=Math.round(v*m*10000)/10000;return out}
function weaponDmg(wpn,lv){const base=wpn.stats.damage||0;const avg=15;return Math.max(Math.floor(avg*base*Math.pow(1+(lv-1)*0.045,1.4)),Math.max(base,5))}
function statValue(item,lv,type,key){if(type==='weapons'){if(key==='damage')return (item.stats.damage||0)*10 + weaponDmg(item,lv)/10 + (item.hasUlt?8:0) + (item.hasTransform?8:0) + ((item.stats.ultGain||0)*4);return 0}return scaledStats(item,lv,type)[key]||0}
function buildValue(item,lv,type,keys){let total=0;const weights=[1000,100,10,1,.5];keys.forEach((k,i)=>total+=statValue(item,lv,type,k)*(weights[i]||1));if(type==='weapons'&&item.specials)total*=1.04;return total}
function itemValue(item,lv,type){const archetypes=[['damage','critDamage','drops','luck'],['critChance','critDamage','damage'],['drops','luck','damage'],['luck','drops','damage'],['xpGain','luck','drops'],['cash','drops','luck'],['defense','health','dodgeChance']];return Math.max(...archetypes.map(keys=>buildValue(item,lv,type,keys))) }
function tierByRank(idx,total){const p=(idx+1)/total;if(p<=.16)return'SS';if(p<=.32)return'SP';if(p<=.50)return'S';if(p<=.68)return'A';if(p<=.84)return'B';return'C'}
function statRows(stats){return Object.entries(stats).map(([k,v])=>{const m=meta(k);return '<div class="sr"><span class="sn"><span class="sd" style="background:'+m.color+'"></span>'+m.label+'</span><span class="sv" style="color:'+m.color+'">'+m.p+fmt(v)+m.s+'</span></div>'}).join('')}
function legend(){return '<div class="lg"><div class="lg-ttl">Stat color key</div><div class="lg-grid">'+Object.entries(META).map(([,m])=>'<div class="lg-item"><span class="lg-dot" style="background:'+m.color+'"></span><span>'+m.label+'</span></div>').join('')+'</div></div>'}
function controls(type,label,filters){const st=STATE[type];return legend()+'<div class="lv-bar"><span class="lv-lbl">'+label+' Level</span><input type="range" class="lv-sl" data-lv="'+type+'" min="1" max="15" step="1" value="'+st.lv+'"><input type="number" class="lv-inp" data-lvinp="'+type+'" min="1" max="15" value="'+st.lv+'"><span class="lv-note">Drag to adjust · max 15</span></div><div class="flt" data-filter="'+type+'">'+filters.map(f=>'<button class="flt-btn '+(st.filter===f.v?'on':'')+'" data-v="'+f.v+'">'+f.label+'</button>').join('')+'</div>'}
function filterItems(items,type){const f=STATE[type].filter;if(f==='all')return items;if(type==='relics')return items.filter(x=>(x.affiliations||[]).includes(f));if(type==='accessories')return items.filter(x=>x.type===f);if(type==='weapons'){if(f==='has-ult')return items.filter(x=>x.hasUlt);if(f==='no-ult')return items.filter(x=>!x.hasUlt)}return items}
function renderList(target,items,type){const lv=STATE[type].lv;const scored=filterItems(items,type).map(x=>({...x,_value:itemValue(x,lv,type)})).sort((a,b)=>b._value-a._value);const total=Math.max(1,scored.length);const grouped={};TIERS.forEach(t=>grouped[t.id]=[]);scored.forEach((x,i)=>grouped[tierByRank(i,total)].push(x));target.innerHTML+=TIERS.map(t=>{const arr=grouped[t.id];if(!arr.length)return'';return '<div class="tb t-'+t.id+'"><div class="tb-hd"><div class="tb-badge">'+t.label+'</div><span class="tb-desc">'+t.desc+'</span><div class="tb-line"></div></div><div class="cg">'+arr.map(x=>card(x,type,lv)).join('')+'</div></div>'}).join('')}
function card(item,type,lv){if(type==='weapons')return weaponCard(item,lv);const st=scaledStats(item,lv,type);const tags=type==='relics'?(item.affiliations||[]).map(a=>'<span class="ac-aff">'+a+'</span>').join(''):'<span class="ac-tp">'+item.type+'</span>';return '<div class="ac"><div class="ac-nm">'+item.name+'</div><div class="ac-mt">'+tags+'<span class="ac-rar r-'+item.rarity+'">'+item.rarity+'</span></div>'+(item.description?'<div class="ac-dsc">'+item.description+'</div>':'')+'<div class="sl">'+(Object.keys(st).length?statRows(st):'<div class="ns">Cosmetic only / no stats</div>')+'</div></div>'}
function weaponCard(wpn,lv){const dmgColor=meta('damage').color;const ult=wpn.ult?'<div class="ult-box"><div class="ult-ttl">⚡ Ultimate</div><div class="ult-nm">'+wpn.ult.displayName+'</div><div class="ult-dsc">'+wpn.ult.description+'</div><div class="ult-cd">CD: '+wpn.ult.cooldown+'s · '+wpn.ult.dmgMulti+'× DMG</div>'+(wpn.ult.extra?'<div class="ult-xtra">'+wpn.ult.extra+'</div>':'')+'</div>':'';const specials=wpn.specials?'<div class="sp-box">'+wpn.specials.map(sp=>'<div class="sp-item">★ '+sp.name+' — '+sp.description+'</div>').join('')+'</div>':'';const tf=wpn.transform?'<div class="tf-box"><div class="tf-ttl">Transform</div>+'+wpn.transform.buffs.damage+'% DMG · +'+wpn.transform.buffs.attackSpeed+'% ATK SPD · '+wpn.transform.duration+'s</div>':'';return '<div class="ac"><div class="ac-nm">'+(wpn.displayName||wpn.name)+'</div><div class="ac-mt"><span class="ac-rar r-'+wpn.rarity+'">'+wpn.rarity+'</span>'+(wpn.tags||[]).map(t=>'<span class="ac-tag">'+t+'</span>').join('')+'</div><div class="ac-dsc">'+wpn.description+'</div><div class="sl"><div class="sr"><span class="sn"><span class="sd" style="background:'+dmgColor+'"></span>DMG Mult</span><span class="sv" style="color:'+dmgColor+'">×'+fmt(wpn.stats.damage||0)+'</span></div>'+(wpn.stats.ultGain?'<div class="sr"><span class="sn"><span class="sd" style="background:'+meta('ultGain').color+'"></span>ULT Charge</span><span class="sv" style="color:'+meta('ultGain').color+'">+'+fmt(wpn.stats.ultGain)+'</span></div>':'')+'<div class="sr"><span class="sn"><span class="sd" style="background:'+dmgColor+'"></span>Scaled DMG lv'+lv+'</span><span class="sv" style="color:'+dmgColor+'">'+weaponDmg(wpn,lv)+'</span></div></div>'+ult+specials+tf+'</div>'}
function renderRelics(){const el=document.getElementById('pane-relics');el.innerHTML=controls('relics','Relic',[{v:'all',label:'All'},{v:'physical',label:'Physical'},{v:'magic',label:'Magic'}]);renderList(el,DATA.relics,'relics')}

function loadoutControls(){const st=STATE.loadouts;return legend()+'<div class="lv-bar"><span class="lv-lbl">Loadout Level</span><input type="range" class="lv-sl" data-lv="loadouts" min="1" max="15" step="1" value="'+st.lv+'"><input type="number" class="lv-inp" data-lvinp="loadouts" min="1" max="15" value="'+st.lv+'"><span class="lv-note">Shows Accessories + Best Relic · You can use 14 relics at max</span></div><div class="subnav" data-filter="loadouts">'+LOADOUTS.map(l=>'<button class="sub-btn '+(st.filter===l.id?'on':'')+'" data-v="'+l.id+'">'+l.label+'</button>').join('')+'</div><div id="loadout-box"></div>'}
function pickTop(items,lv,type,keys,count,slot){let pool=items;if(slot)pool=pool.filter(x=>x.type===slot);return pool.map(x=>({...x,_value:buildValue(x,lv,type,keys)})).filter(x=>x._value>0).sort((a,b)=>b._value-a._value).slice(0,count)}

    for(let i = 0; i < damageCurve.length - 1; i++){
      const a = damageCurve[i];
      const b = damageCurve[i + 1];

    };

    const theme = colors[group] || colors.damage;

    list.innerHTML = '<div class="extra-grid">' + gauntletModifiers[group].map((card,index) => `
      <div class="modifier-card" style="--mod-color:${theme.color};--mod-border:${theme.border};--mod-soft:${theme.soft};--mod-glow:${theme.glow};--mod-hover:${theme.hover};animation-delay:${Math.min(index * 0.035, .22)}s">
        <div class="modifier-title">${card.name}</div>
        <div class="modifier-lines">
          ${card.lines.map(line => `<span class="modifier-pill">${line}</span>`).join('')}
        </div>
        ${card.desc ? `<div class="modifier-desc">${card.desc}</div>` : ""}
      </div>
    `).join('') + '</div>';
  }

  function renderGauntletModifiers(){
    const pane = document.getElementById('pane-g-modifiers');
    if(!pane) return;
    pane.innerHTML = `
      <div class="extra-tabs-wrap">
        <div class="mini-tabs" id="modifier-tabs">
          <button class="mini-tab on" data-group="damage">Damage</button>
          <button class="mini-tab" data-group="drop">Drop</button>
          <button class="mini-tab" data-group="luck">Luck</button>
        </div>
        <div id="modifier-list" class="extra-list"></div>
      </div>
    `;
    document.getElementById('modifier-tabs').addEventListener('click', e => {
      const btn = e.target.closest('.mini-tab');
      if(!btn) return;
      document.querySelectorAll('#modifier-tabs .mini-tab').forEach(x => x.classList.toggle('on', x === btn));
      renderModifierGroup(btn.dataset.group);
    });
    renderModifierGroup('damage');
  }

  function normalizeName(value){
    return String(value).toLowerCase().replace(/[^a-z0-9]/g, '');
  }

  const rarityStyle = {
    common: {label:'Common', color:'#9ca3af', order:1},
    rare: {label:'Rare', color:'#60a5fa', order:2},
    epic: {label:'Epic', color:'#c084fc', order:3},
    legendary: {label:'Legendary', color:'#facc15', order:4},
    mythical: {label:'Mythical', color:'#f87171', order:5},
    exclusive: {label:'Exclusive', color:'#ff4dff', order:6},
    unknown: {label:'Unknown', color:'#a78bfa', order:99}
  };

  function getDropMeta(name, group){
    const allItems = []
      .concat((typeof DATA !== 'undefined' && DATA.weapons) ? DATA.weapons.map(x => ({name:x.displayName || x.name, rarity:x.rarity, type:'Weapon'})) : [])
      .concat((typeof DATA !== 'undefined' && DATA.accessories) ? DATA.accessories.map(x => ({name:x.name, rarity:x.rarity, type:'Accessory', slot:x.type})) : [])
      .concat((typeof DATA !== 'undefined' && DATA.relics) ? DATA.relics.map(x => ({name:x.name, rarity:x.rarity, type:'Relic'})) : []);

    const found = allItems.find(item => normalizeName(item.name) === normalizeName(name));
    if(found) return found;

    return {
      name,
      rarity: 'unknown',
      type: group === 'weapons' ? 'Weapon' : group === 'accessories' ? 'Accessory' : 'Relic'
    };
  }

  function renderDropGroup(group){
    const list = document.getElementById('drops-list');
    if(!list) return;

    const data = dropData[group];
    const items = Object.keys(data).map(name => {
      const meta = getDropMeta(name, group);
      const style = rarityStyle[meta.rarity] || rarityStyle.unknown;
      return {name, sources:data[name], meta, style};
    }).sort((a,b) => {
      if(a.style.order !== b.style.order) return b.style.order - a.style.order;
      return a.name.localeCompare(b.name);
    });

    const byRarity = {};
    items.forEach(item => {
      const key = item.meta.rarity || 'unknown';
      if(!byRarity[key]) byRarity[key] = [];
      byRarity[key].push(item);
    });

    const rarityKeys = Object.keys(byRarity).sort((a,b) => (rarityStyle[b]?.order || 99) - (rarityStyle[a]?.order || 99));

    list.innerHTML = rarityKeys.map(rarity => {
      const style = rarityStyle[rarity] || rarityStyle.unknown;
      return `
        <div class="drop-rarity-title" style="color:${style.color}">
          <span>${style.label}</span>
        </div>
        <div class="extra-grid">
          ${byRarity[rarity].map((item,index) => `
            <div class="drop-card" style="--drop-color:${item.style.color};animation-delay:${Math.min(index * 0.035, .22)}s">
              <div class="drop-name">${item.meta.name || item.name}</div>
              <div class="drop-meta">
                <span class="drop-pill">${item.meta.type}</span>
                ${item.meta.slot ? `<span class="drop-pill">${item.meta.slot}</span>` : ''}
                <span class="drop-pill" style="color:${item.style.color};border-color:${item.style.color}66">${item.style.label}</span>
              </div>
              <div class="drop-sources">
                ${item.sources.map(source => `<div class="drop-line">${source}</div>`).join('')}
              </div>
            </div>
          `).join('')}
        </div>
      `;
    }).join('');
  }

  function renderDrops(){
    const pane = document.getElementById('pane-drops');
    if(!pane) return;
    pane.innerHTML = `
      <div class="extra-tabs-wrap">
        <div class="mini-tabs" id="drops-tabs">
          <button class="mini-tab on" data-group="weapons">Weapons</button>
          <button class="mini-tab" data-group="accessories">Accessories</button>
          <button class="mini-tab" data-group="relics">Relics</button>
        </div>
        <div id="drops-list" class="extra-list"></div>
      </div>
    `;
    document.getElementById('drops-tabs').addEventListener('click', e => {
      const btn = e.target.closest('.mini-tab');
      if(!btn) return;
      document.querySelectorAll('#drops-tabs .mini-tab').forEach(x => x.classList.toggle('on', x === btn));
      renderDropGroup(btn.dataset.group);
    });
    renderDropGroup('weapons');
  }

  renderSuperWarriors();
  renderGauntletModifiers();
  renderDrops();
})();
</script>

</body>
</html>
